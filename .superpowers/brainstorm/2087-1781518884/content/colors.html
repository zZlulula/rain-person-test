<h2>配色方案 — 心理测试沙盘风格</h2>
<p class="subtitle">当前是纯黑底白字，选择一个符合"雨中"意境的新配色方向</p>

<div class="options">
  <div class="option" data-choice="deepblue" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深邃雨夜</h3>
      <p>深蓝灰背景 + 柔和暖白文字 + 金色点缀。像雨夜灯光穿过窗户的宁静感。</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:60px;height:40px;background:#1a1f2e;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#252d3f;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#e8dcc8;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#c9a96e;border-radius:6px;"></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="misty" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>薄雾清晨</h3>
      <p>暖灰绿渐变 + 深棕文字 + 淡绿点缀。雨后清晨薄雾笼罩的安静治愈感。</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:60px;height:40px;background:#e8e4dc;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#c4bfb5;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#3b3834;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#7a9e7e;border-radius:6px;"></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="darkteal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>暗夜森林</h3>
      <p>墨绿黑底 + 柔和米白 + 青绿点缀。雨夜森林中安静冥想的氛围，专业而温暖。</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:60px;height:40px;background:#141e1a;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#1e2c26;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#f0ebe0;border-radius:6px;"></div>
        <div style="width:60px;height:40px;background:#5a8f7b;border-radius:6px;"></div>
      </div>
    </div>
  </div>
</div>
