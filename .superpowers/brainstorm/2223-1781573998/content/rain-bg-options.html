<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页预览 — 雨量 + 背景</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  /* ═══ 画布 ═══ */
  body {
    background: #222;
    display: flex; justify-content: center; align-items: center; gap: 16px;
    min-height: 100vh; font-family: 'Microsoft YaHei','PingFang SC',sans-serif;
    flex-wrap: wrap; padding: 20px;
  }
  .phone {
    width: 390px; height: 844px;
    position: relative; overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }

  /* ═══ 共用背景 ═══ */
  .bg-common { position: absolute; inset: 0; z-index: 0; }

  /* ═══ 背景 A: 原版 — 纯色 ═══ */
  .bg-a { background: #e8ebe4; }
  .phone-a .rain-a .drop {
    background: linear-gradient(to bottom, transparent, rgba(42,58,46,.10), transparent);
  }

  /* ═══ 背景 B: 清透 — 微雾渐变 ═══ */
  .bg-b {
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.55) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(200,215,200,.30) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 60%, rgba(200,210,200,.25) 0%, transparent 45%),
      #eef1ec;
  }
  .phone-b .rain-b .drop {
    background: linear-gradient(to bottom, transparent, rgba(42,58,46,.14), rgba(42,58,46,.06), transparent);
  }

  /* ═══ 背景 C: 清透 + 微光斑 ═══ */
  .bg-c {
    background:
      radial-gradient(ellipse at 50% 25%, rgba(255,255,255,.60) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 75%, rgba(190,210,190,.35) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 55%, rgba(195,210,195,.30) 0%, transparent 45%),
      #eaf0e8;
  }
  .phone-c .rain-c .drop {
    background: linear-gradient(to bottom, transparent, rgba(42,58,46,.16), rgba(42,58,46,.08), transparent);
  }
  .light-spot {
    position: absolute; border-radius: 50%; filter: blur(40px);
    pointer-events: none; z-index: 0;
  }

  /* ═══ 雨容器 ═══ */
  .rain-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .drop {
    position: absolute; width: 1px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-120px) rotate(8deg); opacity: 0; }
    5%   { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(920px) rotate(8deg); opacity: 0; }
  }

  /* ═══ 文字层 ═══ */
  .content { position: relative; z-index: 2; height: 100%; }
  .title {
    position: absolute; left:0; right:0; top: 30%;
    text-align: center; font-size: 64px; font-weight: 200;
    letter-spacing: 16px; color: rgba(42,58,46,.86);
  }
  .sub {
    position: absolute; left:0; right:0; top: 40%;
    text-align: center; font-size: 18px; font-weight: 300;
    letter-spacing: 6px; color: rgba(42,58,46,.54);
  }
  .btn-wrap {
    position: absolute; left:0; right:0; top: 54%;
    display: flex; justify-content: center;
  }
  .btn {
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 26px; font-weight: 300;
    letter-spacing: 8px; color: #8a9c8a;
    padding: 10px 36px; position: relative;
    transition: all .4s cubic-bezier(.25,.8,.25,1);
  }
  .btn::after {
    content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 32px; height: 1.5px; border-radius: 1px;
    background: rgba(58,74,63,.22);
    transition: all .4s cubic-bezier(.25,.8,.25,1);
    animation: line-pulse 3.2s ease-in-out infinite;
  }
  @keyframes line-pulse {
    0%,100% { width: 32px; }
    50%     { width: 56px; }
  }
  .btn:hover, .btn.highlight {
    color: #fef4ca; font-weight: 400; letter-spacing: 14px;
    text-shadow:
      0 0 10px rgba(252,208,128,.65),
      0 0 22px rgba(250,192,112,.45);
  }
  .btn:hover::after, .btn.highlight::after {
    width: 100%; animation: none;
    background: linear-gradient(to right, transparent, rgba(252,208,128,.8) 15%, rgba(252,208,128,.8) 85%, transparent);
    box-shadow: 0 0 8px rgba(252,208,128,.5);
  }

  /* ═══ 标签 ═══ */
  .tag {
    position: absolute; top: 12px; left: 16px; z-index: 5;
    font-size: 13px; font-weight: 600; letter-spacing: 1px;
    color: rgba(42,58,46,.35);
  }
</style>
</head>
<body>

<!-- ═══ A: 原版 ═══ -->
<div class="phone phone-a">
  <div class="tag">A · 原版 20 条 maxOpacity .06</div>
  <div class="bg-a bg-common"></div>
  <div class="rain-layer rain-a" id="rainA"></div>
  <div class="content">
    <div class="title">雨中人</div>
    <div class="sub">一场关于内心世界的雨境之旅</div>
    <div class="btn-wrap"><button class="btn" onclick="this.classList.toggle('highlight')">开&emsp;始</button></div>
  </div>
</div>

<!-- ═══ B: 清透 + 中雨 ═══ -->
<div class="phone phone-b">
  <div class="tag">B · 清透微雾 30 条 opacity .14</div>
  <div class="bg-b bg-common"></div>
  <div class="rain-layer rain-b" id="rainB"></div>
  <div class="content">
    <div class="title">雨中人</div>
    <div class="sub">一场关于内心世界的雨境之旅</div>
    <div class="btn-wrap"><button class="btn" onclick="this.classList.toggle('highlight')">开&emsp;始</button></div>
  </div>
</div>

<!-- ═══ C: 清透光斑 + 密雨 ═══ -->
<div class="phone phone-c">
  <div class="tag">C · 光斑清透 40 条 opacity .18</div>
  <div class="bg-c bg-common"></div>
  <div class="light-spot" style="width:180px;height:180px;top:8%;left:60%;background:rgba(122,155,138,.10)"></div>
  <div class="light-spot" style="width:120px;height:120px;top:65%;left:10%;background:rgba(140,170,150,.08)"></div>
  <div class="light-spot" style="width:150px;height:150px;top:70%;left:70%;background:rgba(122,155,138,.06)"></div>
  <div class="rain-layer rain-c" id="rainC"></div>
  <div class="content">
    <div class="title">雨中人</div>
    <div class="sub">一场关于内心世界的雨境之旅</div>
    <div class="btn-wrap"><button class="btn" onclick="this.classList.toggle('highlight')">开&emsp;始</button></div>
  </div>
</div>

<script>
function fillRain(id, count, lenMin, lenMax, speedMin, speedMax) {
  const layer = document.getElementById(id);
  for (let i=0; i<count; i++) {
    const d = document.createElement('div');
    d.className = 'drop';
    d.style.left = Math.random()*100+'%';
    d.style.animationDuration = (speedMin+Math.random()*speedMax)+'s';
    d.style.animationDelay = Math.random()*5+'s';
    d.style.height = (lenMin+Math.random()*lenMax)+'px';
    layer.appendChild(d);
  }
}
fillRain('rainA', 20, 40, 80, 1.8, 3.5);
fillRain('rainB', 30, 50, 90, 1.5, 3.0);
fillRain('rainC', 40, 55, 100, 1.2, 2.6);
</script>
</body>
</html>
