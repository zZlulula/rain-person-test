<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浅色背景按钮 · 对比度调试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#c5cac0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;gap:24px}

.phone{width:380px;background:#e8ebe4;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.03)}
.phone-inner{aspect-ratio:9/18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;position:relative;overflow:hidden;background:linear-gradient(180deg,#e8ebe4,#dce3d6)}

/* ═══ 版本 A：更明显的毛玻璃（增加背景不透明度） ═══ */
.glass-a{
  position:relative;padding:14px 32px;border-radius:12px;
  border:1px solid rgba(58,74,63,.2);
  background:rgba(58,74,63,.06);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#3a4a3f;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.glass-a.sel{
  transform:scale(1.05);
  background:rgba(122,155,138,.2);
  border-color:rgba(122,155,138,.5);
  box-shadow:0 0 0 4px rgba(122,155,138,.1),0 0 0 12px rgba(122,155,138,.04),0 4px 24px rgba(122,155,138,.15);
}

/* ═══ 版本 B：深色边框 + 更实质感 ═══ */
.glass-b{
  position:relative;padding:14px 32px;border-radius:12px;
  border:1.5px solid rgba(58,74,63,.28);
  background:rgba(58,74,63,.04);
  color:#3a4a3f;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.glass-b.sel{
  transform:scale(1.05);
  background:rgba(122,155,138,.2);
  border-color:rgba(122,155,138,.55);
  box-shadow:0 0 0 4px rgba(122,155,138,.1),0 0 0 14px rgba(122,155,138,.03),0 6px 28px rgba(122,155,138,.18);
}

/* ═══ 版本 C：微妙底色 + 清晰边框 ═══ */
.glass-c{
  position:relative;padding:14px 32px;border-radius:12px;
  border:1px solid rgba(58,74,63,.35);
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:#3a4a3f;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.glass-c.sel{
  transform:scale(1.05);
  background:rgba(122,155,138,.22);
  border-color:rgba(122,155,138,.55);
  box-shadow:0 0 0 4px rgba(122,155,138,.1),0 0 0 14px rgba(122,155,138,.03),0 6px 28px rgba(122,155,138,.18);
}

/* 入场动画 */
.mist-enter{opacity:0;transform:translateY(16px);filter:blur(6px)}
.mist-enter.go{animation:mistIn .6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes mistIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}
.d0{animation-delay:0s}.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}

.star-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:9999;
  animation:starBurst 1.4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes starBurst{
  0%{opacity:1;transform:translate(0,0) scale(1)}60%{opacity:.5}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
.ripple{position:fixed;border-radius:50%;border:1px solid rgba(122,155,138,.25);pointer-events:none;z-index:9998;animation:ripOut .75s ease-out forwards}
@keyframes ripOut{0%{width:0;height:0;opacity:.5}100%{width:150px;height:150px;opacity:0;margin-left:-75px;margin-top:-75px}}

.replay-btn{
  padding:8px 24px;border-radius:20px;border:1px solid rgba(58,74,63,.2);
  background:rgba(58,74,63,.04);color:#3a4a3f;font-family:inherit;
  font-size:12px;font-weight:300;letter-spacing:2px;cursor:pointer;
}
.replay-btn:hover{background:rgba(58,74,63,.08)}
</style>
</head>
<body>

<!-- 版本 A -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:12px;font-weight:300;letter-spacing:2px;color:rgba(58,74,63,.4)">A · 背景 6% + 边框 20%</div>
  <div style="display:flex;justify-content:center;margin-bottom:10px"><button class="replay-btn" onclick="replay('sa')">▶ 重播</button></div>
  <div class="phone"><div class="phone-inner" id="sa">
    <div class="mist-enter" style="display:flex;gap:16px">
      <button class="glass-a" onclick="toggleSel(this)">皱眉</button>
      <button class="glass-a" onclick="toggleSel(this)">抿嘴</button>
      <button class="glass-a" onclick="toggleSel(this)">皱眉+抿嘴</button>
    </div>
    <div class="mist-enter" style="display:flex;gap:28px">
      <button class="glass-a" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">伞</button>
      <button class="glass-a" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">亭子</button>
    </div>
    <div class="mist-enter">
      <button class="glass-a" style="padding:14px 48px;font-size:18px;letter-spacing:4px" onclick="toggleSel(this)">开 始</button>
    </div>
  </div></div>
</div>

<!-- 版本 B -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:12px;font-weight:300;letter-spacing:2px;color:rgba(58,74,63,.4)">B · 加粗边框 1.5px + 背景 4%</div>
  <div style="display:flex;justify-content:center;margin-bottom:10px"><button class="replay-btn" onclick="replay('sb')">▶ 重播</button></div>
  <div class="phone"><div class="phone-inner" id="sb">
    <div class="mist-enter" style="display:flex;gap:16px">
      <button class="glass-b" onclick="toggleSel(this)">皱眉</button>
      <button class="glass-b" onclick="toggleSel(this)">抿嘴</button>
      <button class="glass-b" onclick="toggleSel(this)">皱眉+抿嘴</button>
    </div>
    <div class="mist-enter" style="display:flex;gap:28px">
      <button class="glass-b" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">伞</button>
      <button class="glass-b" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">亭子</button>
    </div>
    <div class="mist-enter">
      <button class="glass-b" style="padding:14px 48px;font-size:18px;letter-spacing:4px" onclick="toggleSel(this)">开 始</button>
    </div>
  </div></div>
</div>

<!-- 版本 C -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:12px;font-weight:300;letter-spacing:2px;color:rgba(58,74,63,.4)">C · 白色半透明底 + 深边框</div>
  <div style="display:flex;justify-content:center;margin-bottom:10px"><button class="replay-btn" onclick="replay('sc')">▶ 重播</button></div>
  <div class="phone"><div class="phone-inner" id="sc">
    <div class="mist-enter" style="display:flex;gap:16px">
      <button class="glass-c" onclick="toggleSel(this)">皱眉</button>
      <button class="glass-c" onclick="toggleSel(this)">抿嘴</button>
      <button class="glass-c" onclick="toggleSel(this)">皱眉+抿嘴</button>
    </div>
    <div class="mist-enter" style="display:flex;gap:28px">
      <button class="glass-c" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">伞</button>
      <button class="glass-c" style="font-size:19px;padding:16px 36px" onclick="toggleSel(this)">亭子</button>
    </div>
    <div class="mist-enter">
      <button class="glass-c" style="padding:14px 48px;font-size:18px;letter-spacing:4px" onclick="toggleSel(this)">开 始</button>
    </div>
  </div></div>
</div>

<script>
document.querySelectorAll('[id^="s"]').forEach(el=>replay(el.id));

function replay(id){
  const el=document.getElementById(id);
  el.querySelectorAll('.mist-enter').forEach((item,i)=>{
    item.classList.remove('go','d0','d1','d2','d3','d4','d5');
    item.style.animation='none';item.offsetHeight;item.style.animation='';
  });
  requestAnimationFrame(()=>{
    el.querySelectorAll('.mist-enter').forEach((item,i)=>{
      item.classList.add('go','d'+Math.min(i,5));
    });
  });
}

function toggleSel(btn){
  const was=btn.classList.contains('sel');
  // 同父内单选
  const p=btn.parentElement;
  if(p) p.querySelectorAll('.sel').forEach(b=>{if(b!==btn)b.classList.remove('sel')});
  btn.classList.toggle('sel');
  if(!was) burst(btn);
}

function burst(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<22;i++){
    const p=document.createElement('div');p.className='star-particle';
    const angle=(i/22)*Math.PI*2+(Math.random()-.5)*.25;
    const dist=38+Math.random()*50;
    p.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;width:${2+Math.random()*3}px;height:${2+Math.random()*2.5}px;background:${Math.random()>.45?'#eaf5e6':'#fff'};animation-delay:${Math.random()*.12}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
  const r=document.createElement('div');r.className='ripple';r.style.left=cx+'px';r.style.top=cy+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),750);
}
</script>
</body>
</html>
