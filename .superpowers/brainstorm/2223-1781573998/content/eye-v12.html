<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v12 — AI机器人风</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:40px; }
  .hint { font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  .eye-wrap { position:relative; width:160px; height:60px; display:flex; align-items:center; justify-content:center; gap:30px; }

  /* 柔光背景 */
  .glow-bg {
    position:absolute; inset:-10px -6px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%, rgba(160,185,140,0.08) 0%, transparent 60%);
    animation:glowP 3s ease-in-out infinite;
  }
  @keyframes glowP { 0%,100%{opacity:0.30} 54%{opacity:0.85} }

  /* 眼睛 — 发光圆 */
  .eye {
    width:28px; height:28px;
    border-radius:50%;
    background:radial-gradient(circle at 45% 40%, #c8e0b0 0%, #8ab868 35%, #5a8a3c 100%);
    box-shadow:
      0 0 8px 2px rgba(140,190,110,0.40),
      0 0 20px 4px rgba(140,190,110,0.18),
      0 0 36px 8px rgba(140,190,110,0.08),
      inset 0 0 6px rgba(220,240,200,0.35);
    position:relative;
    animation:eyePulse 2.6s ease-in-out infinite, eyeBlink 4.5s ease-in-out infinite;
  }
  @keyframes eyePulse {
    0%,100%{transform:scale(1);box-shadow:0 0 8px 2px rgba(140,190,110,0.40),0 0 20px 4px rgba(140,190,110,0.18),0 0 36px 8px rgba(140,190,110,0.08),inset 0 0 6px rgba(220,240,200,0.35)}
    50%{transform:scale(1.06);box-shadow:0 0 12px 3px rgba(150,200,120,0.50),0 0 26px 6px rgba(140,190,110,0.24),0 0 42px 10px rgba(140,190,110,0.10),inset 0 0 8px rgba(230,245,210,0.42)}
  }
  @keyframes eyeBlink {
    0%,42%,52%,100%{transform:scaleY(1)}
    47%{transform:scaleY(0.08)}
  }

  /* 高光点 */
  .eye::after {
    content:'';
    position:absolute;
    width:7px; height:7px;
    background:white;
    border-radius:50%;
    top:4px; left:5px;
    box-shadow:0 0 3px white,0 0 6px rgba(255,255,255,0.5);
    animation:highlightShift 3.5s ease-in-out infinite;
  }
  @keyframes highlightShift {
    0%,100%{transform:translate(0,0);opacity:0.80}
    25%{transform:translate(1.5px,1px);opacity:0.95}
    50%{transform:translate(0,1.5px);opacity:0.75}
    75%{transform:translate(-1px,0.5px);opacity:0.90}
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="glow-bg"></div>
    <div class="eye"></div>
    <div class="eye"></div>
  </div>
</div>
</body>
</html>
