<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B 深化 — 毛玻璃方向</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #131613;
    color: #c8dcc6;
    font-family: 'Microsoft YaHei','PingFang SC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
    gap: 40px;
  }
  h2 {
    font-weight: 300; letter-spacing: 4px; font-size: 18px;
    color: #8a9c8a; margin-bottom: 2px;
  }
  .sub {
    font-size: 12px; color: #5a6a5a; letter-spacing: 2px; margin-bottom: 10px;
  }
  .section {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .row {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }

  /* ── 共用底子 ── */
  .btn {
    position: relative;
    padding: 18px 28px;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 3px;
    color: #708070;
    cursor: default;
    user-select: none;
    text-align: center;
    min-width: 100px;
    border-radius: 16px;
    transition: all 0.65s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent;
  }

  /* ═══════════════════════════════ */
  /*   B1 — 基础毛玻璃             */
  /* ═══════════════════════════════ */
  .b1 .btn.sel {
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-color: rgba(255,255,255,.07);
    color: #e4eee2;
    letter-spacing: 6px;
    font-weight: 400;
    transform: translateY(-2px);
    box-shadow:
      0 8px 28px rgba(0,0,0,.22),
      inset 0 1px 0 rgba(255,255,255,.04);
  }

  /* ═══════════════════════════════ */
  /*   B2 — 深磨砂 + 暖调微光      */
  /* ═══════════════════════════════ */
  .b2 .btn.sel {
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-color: rgba(255,255,255,.1);
    color: #f0f6ee;
    letter-spacing: 6px;
    font-weight: 400;
    transform: translateY(-3px);
    box-shadow:
      0 12px 36px rgba(0,0,0,.28),
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 1px 0 rgba(255,255,255,.05) inset;
  }
  .b2 .btn.sel::after {
    content: '';
    position: absolute; top: 0; left: 12px; right: 12px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(252,208,128,.14), rgba(252,208,128,.14), transparent);
  }

  /* ═══════════════════════════════ */
  /*   B3 — 轻磨砂 + 底部微光条     */
  /* ═══════════════════════════════ */
  .b3 .btn.sel {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border-color: rgba(255,255,255,.05);
    color: #dee8dc;
    letter-spacing: 5px;
    font-weight: 400;
    transform: translateY(-2px);
    box-shadow:
      0 6px 24px rgba(0,0,0,.16),
      inset 0 1px 0 rgba(255,255,255,.03);
  }
  .b3 .glow-bar {
    position: absolute; left: 50%; bottom: 6px;
    transform: translateX(-50%);
    width: 0; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(200,220,190,.38), rgba(200,220,190,.38), transparent);
    border-radius: 1px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .b3 .btn.sel .glow-bar { width: 40px; }

  /* ═══════════════════════════════ */
  /*   B4 — 极简：仅文字浮起        */
  /* ═══════════════════════════════ */
  .b4 .btn.sel {
    background: none;
    border-color: transparent;
    color: #ecf4ea;
    letter-spacing: 6px;
    font-weight: 400;
    transform: translateY(-2px) scale(1.04);
    text-shadow: 0 0 18px rgba(220,240,210,.18), 0 0 40px rgba(200,225,190,.08);
    box-shadow: none;
    backdrop-filter: none;
  }

  /* ═══════════════════════════════ */
  /*   当前方案对照                */
  /* ═══════════════════════════════ */
  .current .btn {
    border-radius: 10px;
  }
  .current .btn.sel {
    color: #c8dcc6;
    letter-spacing: 6px;
    border-color: transparent;
  }
  .current .glow {
    position: absolute; inset: -14px -20px; border-radius: 30px; pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(200,220,200,.10) 0%, rgba(190,210,185,.03) 60%, transparent 100%);
    transition: opacity 0.7s;
  }
  .current .btn.sel .glow { opacity: 1; }
  .current .ring {
    position: absolute; inset: -6px; border-radius: 18px;
    border: 1px solid rgba(200,220,200,.18);
    opacity: 0; transform: scale(1.05); pointer-events: none;
  }
  .current .btn.sel .ring {
    animation: ringOut 1.2s ease-out forwards;
  }
  @keyframes ringOut {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.3); }
  }

  /* debug: bg stripe to show backdrop-filter working */
  .bg-test {
    position: absolute; inset: 0; z-index: -1;
    background:
      radial-gradient(circle at 20% 30%, rgba(50,80,50,.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(40,60,45,.25) 0%, transparent 50%);
    border-radius: 16px;
  }
</style>
</head>
<body>

<h2 style="color:#5a6a5a; font-size:13px;">当前方案 — 扩圈 + 光晕 + 光尘</h2>
<div class="section current">
  <div class="row">
    <div class="btn">听歌<div class="glow"></div><div class="ring"></div></div>
    <div class="btn">发呆<div class="glow"></div><div class="ring"></div></div>
    <div class="btn sel">娱乐<div class="glow"></div><div class="ring"></div></div>
    <div class="btn">游戏<div class="glow"></div><div class="ring"></div></div>
    <div class="btn">家人<div class="glow"></div><div class="ring"></div></div>
    <div class="btn">朋友<div class="glow"></div><div class="ring"></div></div>
  </div>
</div>

<h2>B1 — 基础毛玻璃<span class="sub"> / 轻磨砂 + 微浮</span></h2>
<div class="section b1">
  <div class="row">
    <div class="btn">听歌</div>
    <div class="btn">发呆</div>
    <div class="btn sel">娱乐</div>
    <div class="btn">游戏</div>
    <div class="btn">家人</div>
    <div class="btn">朋友</div>
  </div>
</div>

<h2>B2 — 深磨砂 + 暖调微光<span class="sub"> / 强模糊 + 暖金顶线 + 深阴影</span></h2>
<div class="section b2">
  <div class="row">
    <div class="btn">听歌</div>
    <div class="btn">发呆</div>
    <div class="btn sel">娱乐</div>
    <div class="btn">游戏</div>
    <div class="btn">家人</div>
    <div class="btn">朋友</div>
  </div>
</div>

<h2>B3 — 轻磨砂 + 底部微光条<span class="sub"> / 克制的毛玻璃 + 淡绿色呼吸底线</span></h2>
<div class="section b3">
  <div class="row">
    <div class="btn">听歌<div class="glow-bar"></div></div>
    <div class="btn">发呆<div class="glow-bar"></div></div>
    <div class="btn sel">娱乐<div class="glow-bar"></div></div>
    <div class="btn">游戏<div class="glow-bar"></div></div>
    <div class="btn">家人<div class="glow-bar"></div></div>
    <div class="btn">朋友<div class="glow-bar"></div></div>
  </div>
</div>

<h2>B4 — 极简文字浮起<span class="sub"> / 无背景、纯文字提亮 + 微微放大 + 柔和光晕</span></h2>
<div class="section b4">
  <div class="row">
    <div class="btn">听歌</div>
    <div class="btn">发呆</div>
    <div class="btn sel">娱乐</div>
    <div class="btn">游戏</div>
    <div class="btn">家人</div>
    <div class="btn">朋友</div>
  </div>
</div>

<script>
const sections = document.querySelectorAll('.section');
setInterval(() => {
  sections.forEach(sec => {
    const btns = sec.querySelectorAll('.btn');
    const selIdx = [...btns].findIndex(b => b.classList.contains('sel'));
    btns[selIdx]?.classList.remove('sel');
    const next = btns[(selIdx + 1) % 6];
    next?.classList.add('sel');
    // re-trigger ring anim
    const ring = next?.querySelector('.ring');
    if (ring) { ring.style.animation = 'none'; ring.offsetHeight; ring.style.animation = ''; }
  });
}, 2400);
</script>
</body>
</html>
