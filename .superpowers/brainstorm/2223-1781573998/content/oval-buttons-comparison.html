<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活火 — 三态分明 v2</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c09; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; user-select:none; }
  .scene { position:relative; width:min(85vw,520px); height:min(85vw,520px); }

  .btn {
    position:absolute; display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; white-space:nowrap;
    transform:translate(-50%,-50%);
    opacity:0;
    animation:btnEnter 0.7s ease-out forwards;
    animation-delay:var(--enter-delay);
  }
  @keyframes btnEnter {
    0%{opacity:0;transform:translate(-50%,-50%) translateY(18px) scale(0.7)}
    100%{opacity:1;transform:translate(-50%,-50%) translateY(0) scale(1)}
  }

  /* ═══════════════════ 普通态：无火 ═══════════════════ */
  .btn .ic {
    font-size:30px; position:relative; z-index:3;
    filter:none;
    transition:all 0.5s ease-out;
  }
  .btn .lb {
    font-size:18px; letter-spacing:3px; color:#889080; font-weight:300;
    transition:all 0.5s ease-out;
  }

  /* 火焰元素 — 普通态完全不可见 */
  .fire-shell { display:none !important; position:absolute; width:0; height:0; top:-14px; z-index:0; pointer-events:none; overflow:hidden; }
  .fire-in {
    position:absolute; inset:10px; border-radius:50%;
    background:radial-gradient(ellipse at 44% 36%, rgba(250,200,138,0.30) 0%, rgba(228,168,108,0.10) 26%, rgba(190,130,68,0.03) 44%, transparent 56%),
                radial-gradient(ellipse at 54% 48%, rgba(255,208,142,0.16) 0%, transparent 34%);
    animation:flickIn 1.8s ease-in-out infinite;
  }
  @keyframes flickIn {
    0%{transform:scale(0.6,0.68);border-radius:48% 52% 43% 57% / 54% 45% 56% 44%}
    28%{transform:scale(1.35,1.25);border-radius:44% 56% 50% 50% / 52% 50% 48% 48%}
    54%{transform:scale(0.7,0.76);border-radius:54% 46% 43% 57% / 46% 54% 48% 52%}
    76%{transform:scale(1.22,1.12);border-radius:46% 54% 52% 48% / 55% 45% 48% 52%}
    100%{transform:scale(0.6,0.68);border-radius:48% 52% 43% 57% / 54% 45% 56% 44%}
  }
  .fire-out {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(ellipse at 45% 38%, rgba(238,188,125,0.16) 0%, rgba(205,155,95,0.05) 28%, transparent 55%);
    animation:flickOut 1.8s ease-in-out infinite;
  }
  @keyframes flickOut {
    0%{transform:scale(0.6,0.68);border-radius:46% 54% 41% 59% / 56% 44% 56% 44%}
    28%{transform:scale(1.38,1.28);border-radius:42% 58% 50% 50% / 52% 50% 48% 48%}
    54%{transform:scale(0.72,0.78);border-radius:56% 44% 42% 58% / 44% 56% 47% 53%}
    76%{transform:scale(1.2,1.1);border-radius:44% 56% 54% 46% / 56% 44% 47% 53%}
    100%{transform:scale(0.6,0.68);border-radius:46% 54% 41% 59% / 56% 44% 56% 44%}
  }
  .spark-shell { display:none !important; position:absolute; width:0; height:0; top:-12px; z-index:2; pointer-events:none; overflow:hidden; }
  .spark {
    position:absolute; border-radius:50%;
    box-shadow:0 0 3px rgba(252,195,118,0.62);
    animation:fly var(--sd) ease-out infinite;
    animation-delay:var(--sdly);
    opacity:0;
  }
  @keyframes fly {
    0%{transform:translate(0,0) scale(1);opacity:0}
    8%{opacity:0.72}
    40%{transform:translate(var(--sx),var(--sy)) scale(0.4);opacity:0.10}
    100%{transform:translate(var(--sx),calc(var(--sy)*1.3)) scale(0);opacity:0}
  }
  .base-line {
    display:none !important; position:absolute; width:0; height:0; bottom:-10px; left:50%; transform:translateX(-50%);
    background:linear-gradient(to right,transparent,rgba(235,180,110,0.30),transparent);
    z-index:0; pointer-events:none; overflow:hidden;
  }

  /* ═══════════════════ 扫视态：火焰出现 ═══════════════════ */
  .btn.gazed .fire-shell { display:block !important; width:68px !important; height:68px !important; }
  .btn.gazed .spark-shell { display:block !important; width:64px !important; height:64px !important; }
  .btn.gazed .spark.g { opacity:1; }
  .btn.gazed .base-line { display:block !important; width:32px !important; height:1px !important; }

  .btn.gazed .ic {
    transform:scale(1.22);
    filter:drop-shadow(0 0 14px rgba(248,202,132,0.58)) drop-shadow(0 0 26px rgba(230,178,110,0.26));
  }
  .btn.gazed .lb {
    color:#e6dcc6 !important; letter-spacing:5px !important;
    text-shadow:0 0 11px rgba(238,188,115,0.38),0 0 22px rgba(215,165,95,0.16) !important;
  }

  /* ═══════════════════ 选中态：火焰升级 ═══════════════════ */
  .btn.selected .fire-shell { display:block !important; width:68px !important; height:68px !important; }
  .btn.selected .fire-in {
    background:radial-gradient(ellipse at 43% 34%, rgba(255,215,150,0.42) 0%, rgba(245,185,125,0.18) 20%, rgba(210,145,80,0.06) 40%, transparent 50%),
                radial-gradient(ellipse at 53% 46%, rgba(255,222,155,0.26) 0%, transparent 30%) !important;
    animation:flickInSel 1.3s ease-in-out infinite !important;
  }
  @keyframes flickInSel {
    0%{transform:scale(0.65,0.7);border-radius:47% 53% 42% 58% / 55% 44% 57% 43%}
    24%{transform:scale(1.42,1.32);border-radius:42% 58% 50% 50% / 51% 51% 49% 49%}
    50%{transform:scale(0.7,0.76);border-radius:55% 45% 42% 58% / 45% 55% 46% 54%}
    72%{transform:scale(1.26,1.16);border-radius:44% 56% 53% 47% / 56% 44% 47% 53%}
    100%{transform:scale(0.65,0.7);border-radius:47% 53% 42% 58% / 55% 44% 57% 43%}
  }
  .btn.selected .fire-out {
    background:radial-gradient(ellipse at 44% 36%, rgba(252,205,142,0.26) 0%, rgba(228,175,112,0.10) 24%, rgba(195,142,75,0.04) 42%, transparent 52%) !important;
    animation:flickOutSel 1.3s ease-in-out infinite !important;
  }
  @keyframes flickOutSel {
    0%{transform:scale(0.65,0.72);border-radius:44% 56% 40% 60% / 57% 43% 57% 43%}
    24%{transform:scale(1.44,1.34);border-radius:40% 60% 50% 50% / 50% 52% 48% 50%}
    50%{transform:scale(0.7,0.78);border-radius:57% 43% 41% 59% / 43% 57% 46% 54%}
    72%{transform:scale(1.24,1.14);border-radius:45% 55% 55% 45% / 57% 43% 46% 54%}
    100%{transform:scale(0.65,0.72);border-radius:44% 56% 40% 60% / 57% 43% 57% 43%}
  }

  .btn.selected .spark-shell { display:block !important; width:64px !important; height:64px !important; }
  .btn.selected .spark.g, .btn.selected .spark.s { opacity:1; }
  .btn.selected .spark { box-shadow:0 0 4px rgba(255,220,158,0.88),0 0 7px rgba(255,198,128,0.50) !important; }

  .btn.selected .base-line {
    display:block !important; width:46px !important; height:1px !important;
    background:linear-gradient(to right,transparent,rgba(248,198,128,0.45),rgba(252,210,138,0.22),rgba(248,198,128,0.45),transparent) !important;
    animation:blPulse 1.5s ease-in-out infinite;
  }
  @keyframes blPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .btn.selected .ic {
    transform:scale(1.45);
    filter:drop-shadow(0 0 18px rgba(255,220,150,0.88)) drop-shadow(0 0 34px rgba(248,195,120,0.50)) drop-shadow(0 0 50px rgba(238,175,105,0.24));
  }
  .btn.selected .lb {
    color:#fef4ca !important; font-weight:500 !important; letter-spacing:8px !important;
    text-shadow:0 0 10px rgba(252,208,128,0.72),0 0 24px rgba(250,192,112,0.50),0 0 44px rgba(238,172,95,0.26),0 0 66px rgba(222,158,80,0.14) !important;
  }

  .info {
    position:fixed; bottom:36px; left:0; right:0; text-align:center;
    font-size:13px; color:rgba(255,255,255,0.16); letter-spacing:2px;
  }
</style>
</head>
<body>
<div class="scene" id="scene"></div>
<div class="info">普通：无火 &nbsp;→&nbsp; 扫视：火焰燃起 &nbsp;→&nbsp; 选中：烈焰全开</div>
<script>
const words=[{l:'听歌',i:'🎧'},{l:'发呆',i:'💭'},{l:'娱乐',i:'🎭'},{l:'游戏',i:'🎮'},{l:'家人',i:'🏠'},{l:'朋友',i:'🤝'}];
const scene=document.getElementById('scene');
const size=Math.min(window.innerWidth*0.85,520);
const R=size*0.34, cx=size/2, cy=size*0.38;
const allBtns=[];

function makeSparks(shell,n,cls){
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    const w=1+Math.random()*2.4;
    s.style.cssText=`
      left:${16+Math.random()*26}px;top:${1+Math.random()*10}px;
      width:${w}px;height:${w}px;
      background:rgba(${238+Math.random()*17},${175+Math.random()*40},108,0.60);
      --sx:${-5+Math.random()*10}px;--sy:${-8-Math.random()*20}px;
      --sd:${2+Math.random()*3.5}s;--sdly:${Math.random()*3}s;
    `;
    s.className='spark '+cls; shell.appendChild(s);
  }
}

words.forEach((w,j)=>{
  const btn=document.createElement('div');
  btn.className='btn';
  btn.style.setProperty('--enter-delay',(j*0.10)+'s');
  btn.style.left=(cx+R*Math.cos((j*60-90)*Math.PI/180))+'px';
  btn.style.top=(cy+R*Math.sin((j*60-90)*Math.PI/180))+'px';

  // 火焰（普通态隐藏）
  const fire=document.createElement('span'); fire.className='fire-shell';
  fire.innerHTML='<span class="fire-out"></span><span class="fire-in"></span>';

  // 火星（普通态隐藏）
  const spk=document.createElement('span'); spk.className='spark-shell';
  makeSparks(spk,3,'g'); // 扫视浮现
  makeSparks(spk,5,'s'); // 选中浮现

  btn.appendChild(fire); btn.appendChild(spk);
  btn.innerHTML+=`<span class="base-line"></span><span class="ic">${w.i}</span><span class="lb">${w.l}</span>`;

  btn.onclick=()=>{
    if(btn.classList.contains('selected')){
      btn.classList.remove('selected');
    }else{
      allBtns.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); btn.classList.remove('gazed');
    }
  };
  btn.onmouseenter=()=>{
    if(btn.classList.contains('selected'))return;
    allBtns.forEach(b=>{if(!b.classList.contains('selected'))b.classList.remove('gazed');});
    btn.classList.add('gazed');
  };
  btn.onmouseleave=()=>{
    if(btn.classList.contains('selected'))return;
    btn.classList.remove('gazed');
  };
  scene.appendChild(btn); allBtns.push(btn);
});

// 自动演示
let ai=-1;
setInterval(()=>{
  const prev=allBtns[ai];
  if(prev&&!prev.classList.contains('selected'))prev.classList.remove('gazed');
  ai=(ai+1)%allBtns.length;
  const cur=allBtns[ai];
  if(cur&&!cur.classList.contains('selected'))cur.classList.add('gazed');
},1800);
</script>
</body>
</html>
