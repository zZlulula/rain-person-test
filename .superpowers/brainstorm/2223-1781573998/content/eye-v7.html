<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v7 — 纯净无眼睑版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:40px; }
  .hint { font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  .eye-wrap { position:relative; width:200px; height:90px; display:flex; align-items:center; justify-content:center; gap:30px; }

  /* 辉光 */
  .aura {
    position:absolute; inset:-20px -14px; border-radius:50%;
    background:
      radial-gradient(ellipse at 35% 48%, rgba(145,175,125,0.12) 0%, transparent 44%),
      radial-gradient(ellipse at 65% 48%, rgba(145,175,125,0.12) 0%, transparent 44%);
    animation:auraP 3.2s ease-in-out infinite; pointer-events:none;
  }
  @keyframes auraP { 0%,100%{opacity:0.30;filter:blur(3px)} 54%{opacity:0.78;filter:blur(5px)} }

  /* 单眼 */
  .eye { position:relative; width:44px; height:28px; z-index:1; }

  /* 眼眶柔影 */
  .socket {
    position:absolute; inset:-6px; border-radius:50%;
    box-shadow:0 0 10px 2px rgba(58,70,52,0.05),0 0 20px 4px rgba(58,70,52,0.025);
    animation:sockP 2.8s ease-in-out infinite;
  }
  @keyframes sockP { 0%,100%{opacity:0.30;transform:scale(0.93)} 52%{opacity:0.62;transform:scale(1.05)} }

  /* 眼白 */
  .sclera {
    position:absolute; inset:1px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 43%, #fafcf7 0%, #f3f5ed 40%, #e7eae0 100%);
    box-shadow:inset 0 0.3px 1px rgba(0,0,0,0.03);
  }

  /* 虹膜 — 大占比，柔和 */
  .iris {
    position:absolute;
    top:2px; bottom:2px; left:5px; right:5px; border-radius:50%;
    background:radial-gradient(circle at 42% 35%,
      #7d9a68 0%, #5a7048 16%, #3e5432 32%,
      #2a3a22 52%, #1c2816 74%, #0b1008 100%);
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.16),
      inset 0 -1.5px 2.5px rgba(0,0,0,0.25),
      0 0 1px rgba(0,0,0,0.10);
    animation:irisD 5s ease-in-out infinite;
  }
  @keyframes irisD {
    0%,100%{transform:translate(0,0.3px)}
    14%{transform:translate(-2.5px,-1.2px)}
    28%{transform:translate(2px,2px)}
    44%{transform:translate(-1.2px,-2.5px)}
    58%{transform:translate(3px,-0.3px)}
    72%{transform:translate(-2.5px,1.2px)}
    86%{transform:translate(0.8px,0)}
  }

  /* 虹膜纹理 */
  .iris-tex {
    position:absolute; top:2px; bottom:2px; left:5px; right:5px; border-radius:50%;
    background:conic-gradient(
      from 0deg,
      rgba(100,120,80,0.0) 0deg, rgba(100,120,80,0.12) 15deg, rgba(100,120,80,0.0) 30deg,
      rgba(100,120,80,0.0) 30deg, rgba(100,120,80,0.12) 45deg, rgba(100,120,80,0.0) 60deg,
      rgba(100,120,80,0.0) 60deg, rgba(100,120,80,0.12) 75deg, rgba(100,120,80,0.0) 90deg,
      rgba(100,120,80,0.0) 90deg, rgba(100,120,80,0.12) 105deg, rgba(100,120,80,0.0) 120deg,
      rgba(100,120,80,0.0) 120deg, rgba(100,120,80,0.12) 135deg, rgba(100,120,80,0.0) 150deg,
      rgba(100,120,80,0.0) 150deg, rgba(100,120,80,0.12) 165deg, rgba(100,120,80,0.0) 180deg,
      rgba(100,120,80,0.0) 180deg, rgba(100,120,80,0.12) 195deg, rgba(100,120,80,0.0) 210deg,
      rgba(100,120,80,0.0) 210deg, rgba(100,120,80,0.12) 225deg, rgba(100,120,80,0.0) 240deg,
      rgba(100,120,80,0.0) 240deg, rgba(100,120,80,0.12) 255deg, rgba(100,120,80,0.0) 270deg,
      rgba(100,120,80,0.0) 270deg, rgba(100,120,80,0.12) 285deg, rgba(100,120,80,0.0) 300deg,
      rgba(100,120,80,0.0) 300deg, rgba(100,120,80,0.12) 315deg, rgba(100,120,80,0.0) 330deg,
      rgba(100,120,80,0.0) 330deg, rgba(100,120,80,0.12) 345deg, rgba(100,120,80,0.0) 360deg
    );
    mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.40) 22%, rgba(0,0,0,0.15) 54%, transparent 74%);
    -webkit-mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.40) 22%, rgba(0,0,0,0.15) 54%, transparent 74%);
    opacity:0.35;
    animation:irisD 5s ease-in-out infinite;
  }

  /* 角膜缘环 */
  .limbal {
    position:absolute; top:1.5px; bottom:1.5px; left:4.5px; right:4.5px; border-radius:50%;
    border:0.7px solid rgba(10,16,8,0.22);
    animation:irisD 5s ease-in-out infinite;
  }

  /* 瞳孔 */
  .pupil {
    position:absolute;
    top:8px; bottom:8px; left:10px; right:10px; border-radius:50%;
    background:radial-gradient(circle at 47% 40%,#1a1f16,#070b05 44%,#020302);
    box-shadow:0 0 0.8px rgba(0,0,0,0.30);
    animation:pupilD 5s ease-in-out infinite;
  }
  @keyframes pupilD {
    0%,100%{transform:translate(0,0.8px)}
    14%{transform:translate(-3.5px,-1.5px)}
    28%{transform:translate(2.5px,2.5px)}
    44%{transform:translate(-1.5px,-3.5px)}
    58%{transform:translate(3.8px,-0.3px)}
    72%{transform:translate(-3px,1.5px)}
    86%{transform:translate(1px,0)}
  }

  /* 主高光 */
  .sh1 {
    position:absolute; width:5.5px; height:5.5px; background:white; border-radius:50%;
    top:6px; left:12px; z-index:5;
    box-shadow:0 0 1.5px white,0 0 5px rgba(255,255,255,0.45);
    animation:sh1D 5s ease-in-out infinite;
  }
  @keyframes sh1D {
    0%,100%{transform:translate(0,0.2px);opacity:0.85}
    14%{transform:translate(-2.5px,-0.8px);opacity:0.92}
    28%{transform:translate(1.8px,1.2px);opacity:0.78}
    44%{transform:translate(-0.8px,-2px);opacity:0.88}
    58%{transform:translate(2.5px,-0.2px);opacity:0.82}
    72%{transform:translate(-2px,0.8px);opacity:0.90}
    86%{transform:translate(0.4px,0);opacity:0.80}
  }

  /* 副高光 */
  .sh2 {
    position:absolute; width:2.5px; height:2.5px; background:white; border-radius:50%;
    top:9px; left:18px; z-index:5;
    box-shadow:0 0 0.8px white;
    animation:sh2D 5s ease-in-out infinite;
  }
  @keyframes sh2D {
    0%,100%{transform:translate(0,0.2px);opacity:0.48}
    14%{transform:translate(-2px,-0.3px);opacity:0.56}
    28%{transform:translate(1.2px,0.8px);opacity:0.42}
    44%{transform:translate(-0.4px,-1.5px);opacity:0.52}
    58%{transform:translate(2px,0);opacity:0.44}
    72%{transform:translate(-1.5px,0.4px);opacity:0.54}
    86%{transform:translate(0.3px,0);opacity:0.46}
  }

  /* 环境反光 */
  .amb {
    position:absolute; width:3.5px; height:2px;
    background:rgba(210,228,200,0.42); border-radius:50%;
    bottom:7px; left:12px; z-index:5;
    filter:blur(0.9px);
    animation:ambD 5s ease-in-out infinite;
  }
  @keyframes ambD {
    0%,100%{transform:translate(0,0.2px);opacity:0.28}
    14%{transform:translate(-2.5px,-0.3px);opacity:0.36}
    28%{transform:translate(1.2px,1.2px);opacity:0.24}
    44%{transform:translate(-0.4px,-2px);opacity:0.34}
    58%{transform:translate(2px,-0.2px);opacity:0.26}
    72%{transform:translate(-1.5px,0.6px);opacity:0.36}
    86%{transform:translate(0.3px,0);opacity:0.25}
  }

  /* 上眼睑自然阴影 — 仅虹膜上方暗角，不覆盖 */
  .lid-shade {
    position:absolute; inset:1px; border-radius:50%; z-index:4;
    box-shadow:inset 0 3px 8px rgba(0,0,0,0.08);
    animation:irisD 5s ease-in-out infinite;
    pointer-events:none;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="aura"></div>
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
    </div>
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
    </div>
  </div>
</div>
</body>
</html>
