<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按钮入场过渡演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#c5cac0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;gap:32px}

.phone{width:380px;background:#e8ebe4;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.03)}
.phone-inner{position:relative;aspect-ratio:9/18;overflow:hidden}

/* ═══ 按钮入场动画 ═══ */
.glass-btn{
  position:relative;padding:13px 30px;border-radius:12px;
  border:1px solid rgba(58,74,63,.15);
  background:rgba(58,74,63,.03);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#3a4a3f;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.glass-btn.sel{
  transform:scale(1.05);
  background:rgba(122,155,138,.18);
  border-color:rgba(122,155,138,.45);
  box-shadow:0 0 0 4px rgba(122,155,138,.08),0 0 0 12px rgba(122,155,138,.03),0 4px 24px rgba(122,155,138,.12);
}

.glass-btn-dark{
  position:relative;padding:13px 30px;border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#fff;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.glass-btn-dark.sel{
  transform:scale(1.05);
  background:rgba(122,155,138,.22);
  border-color:rgba(122,155,138,.55);
  box-shadow:0 0 0 4px rgba(122,155,138,.1),0 0 0 12px rgba(122,155,138,.04),0 4px 28px rgba(122,155,138,.18);
}

/* ═══ 入场动画：雾气浮现 ═══ */
.mist-enter{
  opacity:0;transform:translateY(16px);filter:blur(6px);
}
.mist-enter.go{
  animation:mistIn .6s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes mistIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}

/* ═══ 延迟序列 ═══ */
.d0{animation-delay:0s}.d1{animation-delay:.1s}.d2{animation-delay:.2s}
.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}

/* ═══ 粒子 ═══ */
.star-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:9999;
  animation:starBurst 1.4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes starBurst{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  60%{opacity:.5}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
.ripple{position:fixed;border-radius:50%;border:1px solid rgba(122,155,138,.25);pointer-events:none;z-index:9998;animation:ripOut .75s ease-out forwards}
@keyframes ripOut{0%{width:0;height:0;opacity:.5}100%{width:150px;height:150px;opacity:0;margin-left:-75px;margin-top:-75px}}

.dark-bg{background:linear-gradient(180deg,#1a221d,#121a16)}
.mask-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:0}

.replay-btn{
  padding:10px 28px;border-radius:20px;border:1px solid rgba(58,74,63,.2);
  background:rgba(58,74,63,.04);color:#3a4a3f;font-family:inherit;
  font-size:13px;font-weight:300;letter-spacing:2px;cursor:pointer;
  transition:all .3s;
}
.replay-btn:hover{background:rgba(58,74,63,.08)}
</style>
</head>
<body>

<!-- ═══════════════ 场景1：浅色底 — 三个按钮依次浮现 ═══════════════ -->
<div>
  <div style="text-align:center;margin-bottom:8px;font-size:12px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.4)">浅色背景 · 按钮依次雾气浮现</div>
  <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px">
    <button class="replay-btn" onclick="replayMist('s1')">▶ 重播入场</button>
  </div>
  <div class="phone">
    <div class="phone-inner" style="background:linear-gradient(180deg,#e8ebe4,#dce3d6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px" id="s1">
      <div class="mist-enter" style="font-size:28px;font-weight:200;letter-spacing:8px;color:#3a4a3f">雨 中 人</div>
      <div class="mist-enter" style="font-size:12px;color:rgba(58,74,63,.45);letter-spacing:3px;margin-bottom:18px">一场关于内心世界的雨境之旅</div>
      <div class="mist-enter" style="display:flex;gap:18px">
        <button class="glass-btn" onclick="toggleSel(this)">皱眉</button>
        <button class="glass-btn" onclick="toggleSel(this)">抿嘴</button>
        <button class="glass-btn" onclick="toggleSel(this)">皱眉+抿嘴</button>
      </div>
      <div class="mist-enter" style="display:flex;gap:28px;margin-top:8px">
        <button class="glass-btn" style="font-size:20px;padding:16px 36px;letter-spacing:3px" onclick="toggleSel(this)">伞</button>
        <button class="glass-btn" style="font-size:20px;padding:16px 36px;letter-spacing:3px" onclick="toggleSel(this)">亭子</button>
      </div>
      <div class="mist-enter" style="margin-top:16px">
        <button class="glass-btn" style="padding:14px 48px;font-size:18px;letter-spacing:5px" onclick="toggleSel(this)">开 始</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ 场景2：暗色底 — 按钮浮现 + 文字先出 ═══════════════ -->
<div>
  <div style="text-align:center;margin-bottom:8px;font-size:12px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.4)">暗色背景（视频页）· 文案先浮现，按钮随后</div>
  <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px">
    <button class="replay-btn" onclick="replayMist('s2')">▶ 重播入场</button>
  </div>
  <div class="phone">
    <div class="phone-inner dark-bg" id="s2">
      <div class="mask-overlay"></div>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px">
        <div class="mist-enter" style="color:#fff;font-size:19px;font-weight:300;text-align:center;line-height:1.7;letter-spacing:1px;max-width:280px">
          你遇到了一位朋友，<br>想象你在和他解释你的烦恼
        </div>
        <div class="mist-enter" style="display:flex;gap:18px">
          <button class="glass-btn-dark" onclick="toggleSel(this)">皱眉</button>
          <button class="glass-btn-dark" onclick="toggleSel(this)">抿嘴</button>
          <button class="glass-btn-dark" onclick="toggleSel(this)">皱眉+抿嘴</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ 场景3：六边形词汇逐个弹入 ═══════════════ -->
<div>
  <div style="text-align:center;margin-bottom:8px;font-size:12px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.4)">六边形词汇 · 逐个弹入（每词间隔 80ms）</div>
  <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px">
    <button class="replay-btn" onclick="replayMist('s3')">▶ 重播入场</button>
  </div>
  <div class="phone">
    <div class="phone-inner dark-bg" id="s3">
      <div class="mask-overlay"></div>
      <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100%">
        <div style="position:relative;width:260px;height:260px">
          <div class="mist-enter" style="position:absolute;top:0;left:50%;transform:translate(-50%,0)"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">听歌</button></div>
          <div class="mist-enter" style="position:absolute;top:52px;right:0"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">发呆</button></div>
          <div class="mist-enter" style="position:absolute;top:170px;right:10px"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">娱乐</button></div>
          <div class="mist-enter" style="position:absolute;top:170px;left:10px"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">游戏</button></div>
          <div class="mist-enter" style="position:absolute;top:52px;left:0"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">家人</button></div>
          <div class="mist-enter" style="position:absolute;top:110px;left:50%;transform:translate(-50%,0)"><button class="glass-btn-dark" style="font-size:15px;padding:10px 24px" onclick="toggleSel(this)">朋友</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// 初始化：自动播放一次入场
document.querySelectorAll('[id^="s"]').forEach(el=>replayMist(el.id));

function replayMist(id){
  const el=document.getElementById(id);
  const items=el.querySelectorAll('.mist-enter');
  // 重置
  items.forEach((item,i)=>{
    item.classList.remove('go','d0','d1','d2','d3','d4','d5','d6');
    item.style.animation='none';
    item.offsetHeight; // force reflow
    item.style.animation='';
  });
  // 触发
  requestAnimationFrame(()=>{
    items.forEach((item,i)=>{
      const delayClass='d'+Math.min(i,6);
      item.classList.add('go',delayClass);
    });
  });
}

function toggleSel(btn){
  const was=btn.classList.contains('sel');
  btn.classList.toggle('sel');
  if(!was) burst(btn);
}

function burst(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='star-particle';
    const angle=(i/22)*Math.PI*2+(Math.random()-.5)*.25;
    const dist=38+Math.random()*50;
    p.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;width:${2+Math.random()*3}px;height:${2+Math.random()*2.5}px;background:${Math.random()>.45?'#eaf5e6':'#fff'};animation-delay:${Math.random()*.12}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1600);
  }
  const r=document.createElement('div');
  r.className='ripple';r.style.left=cx+'px';r.style.top=cy+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),750);
}
</script>
</body>
</html>
