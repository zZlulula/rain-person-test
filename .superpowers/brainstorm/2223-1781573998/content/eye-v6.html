<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v6 + 按钮 同框预览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:60px; }

  /* ═══════════════ 眼睛区域 ═══════════════ */
  .eye-scene { display:flex; flex-direction:column; align-items:center; gap:32px; }
  .hint { font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  .eye-wrap {
    position:relative; width:200px; height:100px;
    display:flex; align-items:center; justify-content:center; gap:28px;
  }

  /* 辉光 */
  .aura {
    position:absolute; inset:-22px -16px; border-radius:50%;
    background:
      radial-gradient(ellipse at 35% 48%, rgba(145,175,125,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 65% 48%, rgba(145,175,125,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(180,200,160,0.06) 0%, transparent 68%);
    animation:auraP 3s ease-in-out infinite; pointer-events:none;
  }
  @keyframes auraP { 0%,100%{opacity:0.25;filter:blur(3px)} 54%{opacity:0.80;filter:blur(6px)} }

  /* 单眼 */
  .eye { position:relative; width:44px; height:32px; z-index:1; }

  /* 眼眶柔光 — 替代 v4 的硬 ring */
  .socket {
    position:absolute; inset:-6px; border-radius:50%;
    box-shadow:0 0 14px 3px rgba(58,70,52,0.06),0 0 28px 6px rgba(58,70,52,0.03);
    animation:sockP 2.8s ease-in-out infinite;
  }
  @keyframes sockP { 0%,100%{opacity:0.25;transform:scale(0.92)} 52%{opacity:0.66;transform:scale(1.06)} }

  /* 眼白 */
  .sclera {
    position:absolute; inset:2px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 43%, #fafbf6 0%, #f2f4ec 38%, #e6e9de 100%);
    box-shadow:inset 0 0.5px 1px rgba(0,0,0,0.04);
  }

  /* 虹膜 */
  .iris-bg {
    position:absolute;
    top:4px; bottom:4px; left:7px; right:7px; border-radius:50%;
    background:radial-gradient(circle at 42% 35%,
      #728a5e 0%, #526944 16%, #3a4e30 32%,
      #2a3a22 52%, #1c2816 74%, #0b1008 100%);
    box-shadow:inset 0 1.2px 2px rgba(255,255,255,0.14),inset 0 -2px 3px rgba(0,0,0,0.28);
    animation:irisD 4.8s ease-in-out infinite;
  }
  @keyframes irisD {
    0%,100%{transform:translate(0,0.5px)}
    14%{transform:translate(-3px,-1.5px)}
    28%{transform:translate(2.5px,2.5px)}
    44%{transform:translate(-1.5px,-3px)}
    58%{transform:translate(3.5px,-0.5px)}
    72%{transform:translate(-3px,1.5px)}
    86%{transform:translate(1px,0)}
  }

  /* 虹膜纹理 */
  .iris-tex {
    position:absolute; top:4px; bottom:4px; left:7px; right:7px; border-radius:50%;
    background:conic-gradient(
      from 0deg,
      rgba(90,110,72,0.0) 0deg, rgba(90,110,72,0.14) 15deg, rgba(90,110,72,0.0) 30deg,
      rgba(90,110,72,0.0) 30deg, rgba(90,110,72,0.14) 45deg, rgba(90,110,72,0.0) 60deg,
      rgba(90,110,72,0.0) 60deg, rgba(90,110,72,0.14) 75deg, rgba(90,110,72,0.0) 90deg,
      rgba(90,110,72,0.0) 90deg, rgba(90,110,72,0.14) 105deg, rgba(90,110,72,0.0) 120deg,
      rgba(90,110,72,0.0) 120deg, rgba(90,110,72,0.14) 135deg, rgba(90,110,72,0.0) 150deg,
      rgba(90,110,72,0.0) 150deg, rgba(90,110,72,0.14) 165deg, rgba(90,110,72,0.0) 180deg,
      rgba(90,110,72,0.0) 180deg, rgba(90,110,72,0.14) 195deg, rgba(90,110,72,0.0) 210deg,
      rgba(90,110,72,0.0) 210deg, rgba(90,110,72,0.14) 225deg, rgba(90,110,72,0.0) 240deg,
      rgba(90,110,72,0.0) 240deg, rgba(90,110,72,0.14) 255deg, rgba(90,110,72,0.0) 270deg,
      rgba(90,110,72,0.0) 270deg, rgba(90,110,72,0.14) 285deg, rgba(90,110,72,0.0) 300deg,
      rgba(90,110,72,0.0) 300deg, rgba(90,110,72,0.14) 315deg, rgba(90,110,72,0.0) 330deg,
      rgba(90,110,72,0.0) 330deg, rgba(90,110,72,0.14) 345deg, rgba(90,110,72,0.0) 360deg
    );
    mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.45) 22%, rgba(0,0,0,0.20) 54%, transparent 74%);
    -webkit-mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.45) 22%, rgba(0,0,0,0.20) 54%, transparent 74%);
    opacity:0.38;
    animation:irisD 4.8s ease-in-out infinite;
  }

  /* 角膜缘环 */
  .limbal {
    position:absolute; top:3.5px; bottom:3.5px; left:6.5px; right:6.5px; border-radius:50%;
    border:0.8px solid rgba(10,16,8,0.26);
    animation:irisD 4.8s ease-in-out infinite;
  }

  /* 瞳孔 */
  .pupil {
    position:absolute; top:10px; bottom:10px; left:12px; right:12px; border-radius:50%;
    background:radial-gradient(circle at 47% 41%,#1a1f16,#080c06 42%,#020302);
    box-shadow:0 0 1px rgba(0,0,0,0.35);
    animation:pupilD 4.8s ease-in-out infinite;
  }
  @keyframes pupilD {
    0%,100%{transform:translate(0,1px)}
    14%{transform:translate(-4.5px,-2px)}
    28%{transform:translate(3px,3px)}
    44%{transform:translate(-2px,-4px)}
    58%{transform:translate(4.5px,-0.5px)}
    72%{transform:translate(-4px,2px)}
    86%{transform:translate(1.5px,0)}
  }

  /* 主高光 */
  .sh1 {
    position:absolute; width:6px; height:6px; background:white; border-radius:50%;
    top:7px; left:13px; z-index:5;
    box-shadow:0 0 2px white,0 0 6px rgba(255,255,255,0.50);
    animation:sh1D 4.8s ease-in-out infinite;
  }
  @keyframes sh1D {
    0%,100%{transform:translate(0,0.3px);opacity:0.86}
    14%{transform:translate(-3px,-1px);opacity:0.92}
    28%{transform:translate(2px,1.5px);opacity:0.80}
    44%{transform:translate(-1px,-2.5px);opacity:0.88}
    58%{transform:translate(3px,-0.3px);opacity:0.84}
    72%{transform:translate(-2.5px,1px);opacity:0.90}
    86%{transform:translate(0.5px,0);opacity:0.82}
  }

  /* 副高光 */
  .sh2 {
    position:absolute; width:3px; height:3px; background:white; border-radius:50%;
    top:10px; left:20px; z-index:5;
    box-shadow:0 0 1px white;
    animation:sh2D 4.8s ease-in-out infinite;
  }
  @keyframes sh2D {
    0%,100%{transform:translate(0,0.3px);opacity:0.50}
    14%{transform:translate(-2.5px,-0.5px);opacity:0.58}
    28%{transform:translate(1.5px,1px);opacity:0.44}
    44%{transform:translate(-0.5px,-2px);opacity:0.54}
    58%{transform:translate(2.5px,0);opacity:0.46}
    72%{transform:translate(-2px,0.5px);opacity:0.56}
    86%{transform:translate(0.3px,0);opacity:0.48}
  }

  /* 环境反光 */
  .amb {
    position:absolute; width:4px; height:2.5px;
    background:rgba(215,232,205,0.45); border-radius:50%;
    bottom:9px; left:13px; z-index:5;
    filter:blur(1px);
    animation:ambD 4.8s ease-in-out infinite;
  }
  @keyframes ambD {
    0%,100%{transform:translate(0,0.3px);opacity:0.30}
    14%{transform:translate(-3px,-0.5px);opacity:0.38}
    28%{transform:translate(1.5px,1.5px);opacity:0.26}
    44%{transform:translate(-0.5px,-2.5px);opacity:0.36}
    58%{transform:translate(2.5px,-0.3px);opacity:0.28}
    72%{transform:translate(-2px,0.8px);opacity:0.38}
    86%{transform:translate(0.3px,0);opacity:0.28}
  }

  /* 上眼睑阴影 — 虹膜上方自然暗角 */
  .lid-shade {
    position:absolute; inset:2px; border-radius:50%; z-index:4;
    box-shadow:inset 0 4px 10px rgba(0,0,0,0.10);
    animation:irisD 4.8s ease-in-out infinite;
    pointer-events:none;
  }

  /* 眨眼上眼睑 — 柔弧形，带渐变过渡 */
  .lid {
    position:absolute; top:-8px; left:-2px; right:-2px; height:48%;
    background:linear-gradient(to bottom, #e8ebe4 0%, #e8ebe4 60%, rgba(232,235,228,0.5) 100%);
    z-index:6; pointer-events:none;
    border-radius:0 0 48% 48%;
    animation:blink 4.5s ease-in-out infinite;
    transform-origin:top center;
  }
  @keyframes blink {
    0%,40%,50%,100%{transform:scaleY(0.03)}
    45%{transform:scaleY(1.06)}
  }

  /* 下眼睑 — 极微动，柔化底部 */
  .lid-lo {
    position:absolute; bottom:-6px; left:-2px; right:-2px; height:5px;
    background:linear-gradient(to top, #e8ebe4 0%, rgba(232,235,228,0.4) 100%);
    z-index:6; pointer-events:none;
    border-radius:50% 50% 0 0;
    animation:blinkLo 4.5s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes blinkLo {
    0%,40%,52%,100%{transform:scaleY(0.06)}
    45.5%{transform:scaleY(0.45)}
  }

  /* 分隔线 */
  .divider { width:120px; height:0.5px; background:rgba(0,0,0,0.08); margin:8px 0; }

  /* ═══════════════ 按钮区域 ═══════════════ */
  .btn-scene {
    position:relative; width:420px; height:380px;
    background:radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0.04) 0%, transparent 70%);
    border-radius:50%;
  }

  .btn {
    position:absolute; display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer; white-space:nowrap;
    transform:translate(-50%,-50%);
    user-select:none;
  }

  .btn .ic {
    font-size:30px; position:relative; z-index:3;
    transition:all 0.5s ease-out;
  }
  .btn .lb {
    font-size:20px; letter-spacing:3px; color:#4a5a40; font-weight:300;
    transition:all 0.5s ease-out;
  }

  /* 火焰元素 — 普通态隐藏 */
  .fire-shell { display:none !important; position:absolute; width:0; height:0; top:-14px; z-index:0; pointer-events:none; overflow:hidden; }
  .fire-in {
    position:absolute; inset:10px; border-radius:50%;
    background:radial-gradient(ellipse at 44% 36%, rgba(250,200,138,0.30) 0%, rgba(228,168,108,0.10) 26%, rgba(190,130,68,0.03) 44%, transparent 56%),
                radial-gradient(ellipse at 54% 48%, rgba(255,208,142,0.16) 0%, transparent 34%);
    animation:flickIn 1.8s ease-in-out infinite;
  }
  @keyframes flickIn {
    0%{transform:scale(0.6,0.68);border-radius:48% 52% 43% 57% / 54% 45% 56% 44%}
    28%{transform:scale(1.35,1.25);border-radius:44% 56% 50% 50% / 52% 50% 48% 48%}
    54%{transform:scale(0.7,0.76);border-radius:54% 46% 43% 57% / 46% 54% 48% 52%}
    76%{transform:scale(1.22,1.12);border-radius:46% 54% 52% 48% / 55% 45% 48% 52%}
    100%{transform:scale(0.6,0.68);border-radius:48% 52% 43% 57% / 54% 45% 56% 44%}
  }
  .fire-out {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(ellipse at 45% 38%, rgba(238,188,125,0.16) 0%, rgba(205,155,95,0.05) 28%, transparent 55%);
    animation:flickOut 1.8s ease-in-out infinite;
  }
  @keyframes flickOut {
    0%{transform:scale(0.6,0.68);border-radius:46% 54% 41% 59% / 56% 44% 56% 44%}
    28%{transform:scale(1.38,1.28);border-radius:42% 58% 50% 50% / 52% 50% 48% 48%}
    54%{transform:scale(0.72,0.78);border-radius:56% 44% 42% 58% / 44% 56% 47% 53%}
    76%{transform:scale(1.2,1.1);border-radius:44% 56% 54% 46% / 56% 44% 47% 53%}
    100%{transform:scale(0.6,0.68);border-radius:46% 54% 41% 59% / 56% 44% 56% 44%}
  }
  .spark-shell { display:none !important; position:absolute; width:0; height:0; top:-12px; z-index:2; pointer-events:none; overflow:hidden; }
  .spark {
    position:absolute; border-radius:50%;
    box-shadow:0 0 3px rgba(252,195,118,0.62);
    animation:fly var(--sd) ease-out infinite;
    animation-delay:var(--sdly);
    opacity:0;
  }
  @keyframes fly {
    0%{transform:translate(0,0) scale(1);opacity:0}
    8%{opacity:0.72}
    40%{transform:translate(var(--sx),var(--sy)) scale(0.4);opacity:0.10}
    100%{transform:translate(var(--sx),calc(var(--sy)*1.3)) scale(0);opacity:0}
  }
  .base-line {
    display:none !important; position:absolute; width:0; height:0; bottom:-10px; left:50%; transform:translateX(-50%);
    background:linear-gradient(to right,transparent,rgba(235,180,110,0.30),transparent);
    z-index:0; pointer-events:none; overflow:hidden;
  }

  /* 扫视态 */
  .btn.gazed .fire-shell { display:block !important; width:68px !important; height:68px !important; }
  .btn.gazed .spark-shell { display:block !important; width:64px !important; height:64px !important; }
  .btn.gazed .spark.g { opacity:1; }
  .btn.gazed .base-line { display:block !important; width:32px !important; height:1px !important; }
  .btn.gazed .ic {
    transform:scale(1.22);
    filter:drop-shadow(0 0 14px rgba(248,202,132,0.58)) drop-shadow(0 0 26px rgba(230,178,110,0.26));
  }
  .btn.gazed .lb {
    color:#e6dcc6 !important; letter-spacing:5px !important;
    text-shadow:0 0 11px rgba(238,188,115,0.38),0 0 22px rgba(215,165,95,0.16) !important;
  }

  /* 选中态 */
  .btn.selected .fire-shell { display:block !important; width:68px !important; height:68px !important; }
  .btn.selected .fire-in {
    background:radial-gradient(ellipse at 43% 34%, rgba(255,215,150,0.42) 0%, rgba(245,185,125,0.18) 20%, rgba(210,145,80,0.06) 40%, transparent 50%),
                radial-gradient(ellipse at 53% 46%, rgba(255,222,155,0.26) 0%, transparent 30%) !important;
    animation:flickInSel 1.3s ease-in-out infinite !important;
  }
  @keyframes flickInSel {
    0%{transform:scale(0.65,0.7);border-radius:47% 53% 42% 58% / 55% 44% 57% 43%}
    24%{transform:scale(1.42,1.32);border-radius:42% 58% 50% 50% / 51% 51% 49% 49%}
    50%{transform:scale(0.7,0.76);border-radius:55% 45% 42% 58% / 45% 55% 46% 54%}
    72%{transform:scale(1.26,1.16);border-radius:44% 56% 53% 47% / 56% 44% 47% 53%}
    100%{transform:scale(0.65,0.7);border-radius:47% 53% 42% 58% / 55% 44% 57% 43%}
  }
  .btn.selected .fire-out {
    background:radial-gradient(ellipse at 44% 36%, rgba(252,205,142,0.26) 0%, rgba(228,175,112,0.10) 24%, rgba(195,142,75,0.04) 42%, transparent 52%) !important;
    animation:flickOutSel 1.3s ease-in-out infinite !important;
  }
  @keyframes flickOutSel {
    0%{transform:scale(0.65,0.72);border-radius:44% 56% 40% 60% / 57% 43% 57% 43%}
    24%{transform:scale(1.44,1.34);border-radius:40% 60% 50% 50% / 50% 52% 48% 50%}
    50%{transform:scale(0.7,0.78);border-radius:57% 43% 41% 59% / 43% 57% 46% 54%}
    72%{transform:scale(1.24,1.14);border-radius:45% 55% 55% 45% / 57% 43% 46% 54%}
    100%{transform:scale(0.65,0.72);border-radius:44% 56% 40% 60% / 57% 43% 57% 43%}
  }
  .btn.selected .spark-shell { display:block !important; width:64px !important; height:64px !important; }
  .btn.selected .spark.g, .btn.selected .spark.s { opacity:1; }
  .btn.selected .spark { box-shadow:0 0 4px rgba(255,220,158,0.88),0 0 7px rgba(255,198,128,0.50) !important; }
  .btn.selected .base-line {
    display:block !important; width:46px !important; height:1px !important;
    background:linear-gradient(to right,transparent,rgba(248,198,128,0.45),rgba(252,210,138,0.22),rgba(248,198,128,0.45),transparent) !important;
    animation:blPulse 1.5s ease-in-out infinite;
  }
  @keyframes blPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .btn.selected .ic {
    transform:scale(1.45);
    filter:drop-shadow(0 0 18px rgba(255,220,150,0.88)) drop-shadow(0 0 34px rgba(248,195,120,0.50)) drop-shadow(0 0 50px rgba(238,175,105,0.24));
  }
  .btn.selected .lb {
    color:#fef4ca !important; font-weight:500 !important; letter-spacing:8px !important;
    text-shadow:0 0 10px rgba(252,208,128,0.72),0 0 24px rgba(250,192,112,0.50),0 0 44px rgba(238,172,95,0.26),0 0 66px rgba(222,158,80,0.14) !important;
  }

  .info {
    font-size:13px; color:rgba(0,0,0,0.18); letter-spacing:2px; margin-top:16px;
  }
</style>
</head>
<body>

<!-- ═══════════ 眼睛 ═══════════ -->
<div class="eye-scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="aura"></div>
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris-bg"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
      <div class="lid"></div>
      <div class="lid-lo"></div>
    </div>
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris-bg"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
      <div class="lid"></div>
      <div class="lid-lo"></div>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- ═══════════ 按钮 ═══════════ -->
<div class="btn-scene" id="scene"></div>
<div class="info">普通：无火 &nbsp;→&nbsp; 扫视：火焰燃起 &nbsp;→&nbsp; 选中：烈焰全开</div>

<script>
const words=[{l:'听歌',i:'🎧'},{l:'发呆',i:'💭'},{l:'娱乐',i:'🎭'},{l:'游戏',i:'🎮'},{l:'家人',i:'🏠'},{l:'朋友',i:'🤝'}];
const scene=document.getElementById('scene');
const size=420;
const R=size*0.34, cx=size/2, cy=size*0.38;
const allBtns=[];

function makeSparks(shell,n,cls){
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    const w=1+Math.random()*2.4;
    s.style.cssText=`
      left:${16+Math.random()*26}px;top:${1+Math.random()*10}px;
      width:${w}px;height:${w}px;
      background:rgba(${238+Math.random()*17},${175+Math.random()*40},108,0.60);
      --sx:${-5+Math.random()*10}px;--sy:${-8-Math.random()*20}px;
      --sd:${2+Math.random()*3.5}s;--sdly:${Math.random()*3}s;
    `;
    s.className='spark '+cls; shell.appendChild(s);
  }
}

words.forEach((w,j)=>{
  const btn=document.createElement('div');
  btn.className='btn';
  btn.style.left=(cx+R*Math.cos((j*60-90)*Math.PI/180))+'px';
  btn.style.top=(cy+R*Math.sin((j*60-90)*Math.PI/180))+'px';

  const fire=document.createElement('span'); fire.className='fire-shell';
  fire.innerHTML='<span class="fire-out"></span><span class="fire-in"></span>';

  const spk=document.createElement('span'); spk.className='spark-shell';
  makeSparks(spk,3,'g');
  makeSparks(spk,5,'s');

  btn.appendChild(fire); btn.appendChild(spk);
  btn.innerHTML+=`<span class="base-line"></span><span class="ic">${w.i}</span><span class="lb">${w.l}</span>`;

  btn.onclick=()=>{
    if(btn.classList.contains('selected')){
      btn.classList.remove('selected');
    }else{
      allBtns.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); btn.classList.remove('gazed');
    }
  };
  btn.onmouseenter=()=>{
    if(btn.classList.contains('selected'))return;
    allBtns.forEach(b=>{if(!b.classList.contains('selected'))b.classList.remove('gazed');});
    btn.classList.add('gazed');
  };
  btn.onmouseleave=()=>{
    if(btn.classList.contains('selected'))return;
    btn.classList.remove('gazed');
  };
  scene.appendChild(btn); allBtns.push(btn);
});

let ai=-1;
setInterval(()=>{
  const prev=allBtns[ai];
  if(prev&&!prev.classList.contains('selected'))prev.classList.remove('gazed');
