<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻光双瞳 v4 — 丰盈版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:45px; }
  .hint { font-size:30px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.55} 50%{opacity:0.90} }

  .eye-wrap {
    position:relative; width:200px; height:110px;
    display:flex; align-items:center; justify-content:center; gap:30px;
  }

  /* ── 辉光背景 — 更丰富 ── */
  .aura-bg {
    position:absolute; inset:-24px -18px;
    background:
      radial-gradient(ellipse at 35% 48%, rgba(145,175,125,0.18) 0%, transparent 48%),
      radial-gradient(ellipse at 65% 48%, rgba(145,175,125,0.18) 0%, transparent 48%),
      radial-gradient(ellipse at 50% 50%, rgba(180,200,160,0.08) 0%, transparent 70%);
    border-radius:50%;
    animation:auraPulse 3.2s ease-in-out infinite;
  }
  @keyframes auraPulse { 0%,100%{opacity:0.3;filter:blur(4px)} 55%{opacity:0.9;filter:blur(8px)} }

  /* ── 单眼 ── */
  .eye { position:relative; width:50px; height:60px; z-index:1; }

  /* ── 眼眶光晕 — 三层 ── */
  .eye .ring1 {
    position:absolute; inset:-8px; border-radius:50%;
    border:0.4px solid rgba(70,80,58,0.12);
    box-shadow:0 0 18px 4px rgba(58,70,52,0.08),0 0 32px 8px rgba(58,70,52,0.03);
    animation:ring1Pulse 3s ease-in-out infinite;
  }
  @keyframes ring1Pulse { 0%,100%{opacity:0.18;transform:scale(0.88)} 55%{opacity:0.72;transform:scale(1.08)} }
  .eye .ring2 {
    position:absolute; inset:-14px; border-radius:50%;
    border:0.3px solid rgba(88,98,72,0.07);
    box-shadow:0 0 28px 6px rgba(58,70,52,0.04);
    animation:ring2Pulse 3s ease-in-out infinite;
  }
  @keyframes ring2Pulse { 0%,100%{opacity:0.12;transform:scale(0.9)} 55%{opacity:0.55;transform:scale(1.10)} }

  /* ── 眼白 — 微灰绿 ── */
  .sclera {
    position:absolute; inset:3px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 45%, #f5f7f0 0%, #e8ede2 40%, #dce2d5 100%);
    box-shadow:inset 0 1px 2px rgba(255,255,255,0.5);
  }

  /* ── 虹膜 — 层叠丰富 ── */
  .iris-bg {
    position:absolute; inset:8px; border-radius:50%;
    /* 基底虹膜 */
    background:radial-gradient(circle at 43% 36%,
      #6b7d58 0%, #4c5c42 18%, #3a4a32 35%,
      #2c3a26 55%, #1e2a1a 75%, #0b1008 100%);
    box-shadow:
      inset 0 1.8px 3px rgba(255,255,255,0.15),
      inset 0 -3px 5px rgba(0,0,0,0.30),
      0 0 2px rgba(0,0,0,0.18);
    animation:irisFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes irisFlow {
    0%,100%{transform:translate(0,1px)}
    15%{transform:translate(-5px,-2px)}
    30%{transform:translate(3px,3px)}
    45%{transform:translate(-2px,-4px)}
    60%{transform:translate(5px,-1px)}
    75%{transform:translate(-4px,2px)}
    90%{transform:translate(1px,0)}
  }

  /* ── 虹膜纹理层 — 放射纤维 ── */
  .iris-texture {
    position:absolute; inset:8px; border-radius:50%;
    background:
      conic-gradient(
        from 0deg,
        rgba(90,110,72,0.0) 0deg, rgba(90,110,72,0.18) 15deg, rgba(90,110,72,0.0) 30deg,
        rgba(90,110,72,0.0) 30deg, rgba(90,110,72,0.18) 45deg, rgba(90,110,72,0.0) 60deg,
        rgba(90,110,72,0.0) 60deg, rgba(90,110,72,0.18) 75deg, rgba(90,110,72,0.0) 90deg,
        rgba(90,110,72,0.0) 90deg, rgba(90,110,72,0.18) 105deg, rgba(90,110,72,0.0) 120deg,
        rgba(90,110,72,0.0) 120deg, rgba(90,110,72,0.18) 135deg, rgba(90,110,72,0.0) 150deg,
        rgba(90,110,72,0.0) 150deg, rgba(90,110,72,0.18) 165deg, rgba(90,110,72,0.0) 180deg,
        rgba(90,110,72,0.0) 180deg, rgba(90,110,72,0.18) 195deg, rgba(90,110,72,0.0) 210deg,
        rgba(90,110,72,0.0) 210deg, rgba(90,110,72,0.18) 225deg, rgba(90,110,72,0.0) 240deg,
        rgba(90,110,72,0.0) 240deg, rgba(90,110,72,0.18) 255deg, rgba(90,110,72,0.0) 270deg,
        rgba(90,110,72,0.0) 270deg, rgba(90,110,72,0.18) 285deg, rgba(90,110,72,0.0) 300deg,
        rgba(90,110,72,0.0) 300deg, rgba(90,110,72,0.18) 315deg, rgba(90,110,72,0.0) 330deg,
        rgba(90,110,72,0.0) 330deg, rgba(90,110,72,0.18) 345deg, rgba(90,110,72,0.0) 360deg
      );
    mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.6) 20%, rgba(0,0,0,0.3) 50%, transparent 70%);
    -webkit-mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.6) 20%, rgba(0,0,0,0.3) 50%, transparent 70%);
    opacity:0.45;
    animation:irisFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }

  /* ── 角膜缘环 — 深色外环 ── */
  .limbal-ring {
    position:absolute; inset:7px; border-radius:50%;
    border:1.2px solid rgba(10,16,8,0.32);
    box-shadow:inset 0 0 3px rgba(0,0,0,0.25),0 0 1px rgba(0,0,0,0.10);
    animation:irisFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }

  /* ── 瞳孔 — 跟随幅度更大 ── */
  .pupil {
    position:absolute; inset:15px; border-radius:50%;
    background:radial-gradient(circle at 48% 42%,#1a1f16,#0a0e08 40%,#020302);
    box-shadow:0 0 2px rgba(0,0,0,0.5);
    animation:pupilFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes pupilFlow {
    0%,100%{transform:translate(0,1.5px)}
    15%{transform:translate(-6px,-2.5px)}
    30%{transform:translate(4px,3.5px)}
    45%{transform:translate(-2.5px,-5px)}
    60%{transform:translate(6px,-1px)}
    75%{transform:translate(-5px,2.5px)}
    90%{transform:translate(1.5px,0)}
  }

  /* ── 主高光 — 大而亮 ── */
  .shine1 {
    position:absolute; width:7px; height:7px; background:white; border-radius:50%;
    top:12px; left:17px; z-index:5;
    box-shadow:0 0 3px white,0 0 8px rgba(255,255,255,0.6);
    animation:shine1Flow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes shine1Flow {
    0%,100%{transform:translate(0,0.5px);opacity:0.88}
    15%{transform:translate(-4px,-1px);opacity:0.94}
    30%{transform:translate(2.5px,2px);opacity:0.82}
    45%{transform:translate(-1.5px,-3px);opacity:0.90}
    60%{transform:translate(3.5px,-0.5px);opacity:0.86}
    75%{transform:translate(-3px,1.5px);opacity:0.92}
    90%{transform:translate(0.5px,0);opacity:0.84}
  }

  /* ── 副高光 — 小 ── */
  .shine2 {
    position:absolute; width:3.5px; height:3.5px; background:white; border-radius:50%;
    top:16px; left:24px; z-index:5;
    box-shadow:0 0 1.5px white;
    animation:shine2Flow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes shine2Flow {
    0%,100%{transform:translate(0,0.5px);opacity:0.55}
    15%{transform:translate(-3px,-0.5px);opacity:0.62}
    30%{transform:translate(2px,1.5px);opacity:0.48}
    45%{transform:translate(-1px,-2.5px);opacity:0.58}
    60%{transform:translate(3px,0);opacity:0.50}
    75%{transform:translate(-2.5px,1px);opacity:0.60}
    90%{transform:translate(0.5px,0);opacity:0.52}
  }

  /* ── 环境反光 — 底部柔和光斑 ── */
  .ambient-reflect {
    position:absolute; width:5px; height:3px;
    background:rgba(220,235,210,0.50);
    border-radius:50%;
    bottom:14px; left:15px; z-index:5;
    filter:blur(1.5px);
    animation:ambFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes ambFlow {
    0%,100%{transform:translate(0,0.5px);opacity:0.35}
    15%{transform:translate(-3.5px,-1px);opacity:0.42}
    30%{transform:translate(2px,2px);opacity:0.30}
    45%{transform:translate(-1px,-3px);opacity:0.40}
    60%{transform:translate(3px,-0.5px);opacity:0.34}
    75%{transform:translate(-2.5px,1px);opacity:0.42}
    90%{transform:translate(0.5px,0);opacity:0.32}
  }

  /* ── 上眼睑阴影 — 虹膜上方暗区 ── */
  .lid-shadow {
    position:absolute; inset:4px; border-radius:50%;
    z-index:4;
    background:transparent;
    box-shadow:inset 0 4px 12px rgba(0,0,0,0.13);
    animation:irisFlow 5.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }

  /* ── 眨眼 — 双层丝滑 ── */
  .lid {
    position:absolute; inset:-12px -6px -8px -6px;
    border-radius:50% 50% 0 0;
    background:#e8ebe4;
    z-index:6;
    animation:blink 4.5s cubic-bezier(0.65,0,0.35,1) infinite;
    transform-origin:bottom center;
    pointer-events:none;
  }
  @keyframes blink {
    0%,42%,52%,100%{transform:scaleY(0.03)}
    47%{transform:scaleY(1.06)}
  }
  /* 下眼睑微动 — 眨眼下缘配合 */
  .lid-lower {
    position:absolute; inset:auto -4px -10px -4px; top:calc(100% - 6px);
    border-radius:0 0 50% 50%;
    background:#e8ebe4;
    z-index:6;
    height:10px;
    animation:blinkLower 4.5s cubic-bezier(0.65,0,0.35,1) infinite;
    transform-origin:top center;
    pointer-events:none;
  }
  @keyframes blinkLower {
    0%,42%,52.5%,100%{transform:scaleY(0.05)}
    47.5%{transform:scaleY(0.55)}
  }

  /* ── 眼角 — 微妙的阴影 ── */
  .eye-corner {
    position:absolute; width:8px; height:4px;
    background:rgba(180,175,155,0.18);
    border-radius:50%;
    top:50%; left:-3px; z-index:0;
    filter:blur(2px);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="aura-bg"></div>
    <!-- 左眼 -->
    <div class="eye">
      <div class="ring2"></div>
      <div class="ring1"></div>
      <div class="sclera"></div>
      <div class="eye-corner"></div>
      <div class="iris-bg"></div>
      <div class="iris-texture"></div>
      <div class="limbal-ring"></div>
      <div class="pupil"></div>
      <div class="ambient-reflect"></div>
      <div class="shine1"></div>
      <div class="shine2"></div>
      <div class="lid-shadow"></div>
      <div class="lid"></div>
      <div class="lid-lower"></div>
    </div>
    <!-- 右眼 -->
    <div class="eye">
      <div class="ring2"></div>
      <div class="ring1"></div>
      <div class="sclera"></div>
      <div class="eye-corner"></div>
      <div class="iris-bg"></div>
      <div class="iris-texture"></div>
      <div class="limbal-ring"></div>
      <div class="pupil"></div>
      <div class="ambient-reflect"></div>
      <div class="shine1"></div>
      <div class="shine2"></div>
      <div class="lid-shadow"></div>
      <div class="lid"></div>
      <div class="lid-lower"></div>
    </div>
  </div>
</div>
</body>
</html>
