<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v8 — 精灵灵动版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:40px; }
  .hint { font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  .eye-wrap { position:relative; width:220px; height:100px; display:flex; align-items:center; justify-content:center; gap:30px; }

  /* ── 辉光 — 更梦幻 ── */
  .aura {
    position:absolute; inset:-24px -16px; border-radius:50%;
    background:
      radial-gradient(ellipse at 35% 48%, rgba(160,195,140,0.13) 0%, transparent 44%),
      radial-gradient(ellipse at 65% 48%, rgba(160,195,140,0.13) 0%, transparent 44%),
      radial-gradient(ellipse at 50% 50%, rgba(180,210,160,0.06) 0%, transparent 65%);
    animation:auraP 3s ease-in-out infinite; pointer-events:none;
  }
  @keyframes auraP { 0%,100%{opacity:0.28;filter:blur(3px)} 54%{opacity:0.82;filter:blur(5px)} }

  /* ── 精灵星点 ── */
  .sparkles {
    position:absolute; inset:-18px -10px; pointer-events:none; z-index:10;
  }
  .sp {
    position:absolute; border-radius:50%; background:white;
    animation:twinkle var(--sd) ease-in-out infinite;
    animation-delay:var(--dl);
    opacity:0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(0.3) translate(0,0)}
    8%{opacity:0.85;transform:scale(1.0) translate(var(--dx),var(--dy))}
    16%{opacity:0;transform:scale(0.2) translate(calc(var(--dx)*2),calc(var(--dy)*2))}
  }

  /* ── 单眼 — 偏圆更精灵 ── */
  .eye { position:relative; width:46px; height:34px; z-index:1; }

  /* 眼眶柔影 */
  .socket {
    position:absolute; inset:-6px; border-radius:50%;
    box-shadow:0 0 12px 3px rgba(60,75,54,0.05),0 0 22px 5px rgba(60,75,54,0.022);
    animation:sockP 2.6s ease-in-out infinite;
  }
  @keyframes sockP { 0%,100%{opacity:0.28;transform:scale(0.93)} 50%{opacity:0.58;transform:scale(1.04)} }

  /* 眼白 */
  .sclera {
    position:absolute; inset:1px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 42%, #fdfefb 0%, #f5f7f0 38%, #eaede4 100%);
    box-shadow:inset 0 0.2px 0.6px rgba(0,0,0,0.025);
  }

  /* 虹膜 — 精灵绿，轻透感 */
  .iris {
    position:absolute;
    top:2.5px; bottom:2.5px; left:6px; right:6px; border-radius:50%;
    background:radial-gradient(circle at 42% 34%,
      #8eb078 0%, #6b8a56 14%, #4e6a3c 30%,
      #354a28 50%, #1e2e16 72%, #0b1008 100%);
    box-shadow:
      inset 0 1.2px 2px rgba(255,255,255,0.18),
      inset 0 -1.5px 2.5px rgba(0,0,0,0.22),
      0 0 0.6px rgba(0,0,0,0.08);
    animation:irisD 4.5s ease-in-out infinite, irisBreathe 2.8s ease-in-out infinite;
  }
  @keyframes irisD {
    0%,100%{transform:translate(0,0.3px)}
    14%{transform:translate(-2.5px,-1px)}
    28%{transform:translate(2px,2px)}
    44%{transform:translate(-1.2px,-2.5px)}
    58%{transform:translate(3px,-0.3px)}
    72%{transform:translate(-2.5px,1.2px)}
    86%{transform:translate(0.8px,0)}
  }
  @keyframes irisBreathe {
    0%,100%{transform:translate(var(--ix),var(--iy)) scale(1)}
    50%{transform:translate(var(--ix),var(--iy)) scale(1.03)}
  }

  /* 虹膜纹理 */
  .iris-tex {
    position:absolute; top:2.5px; bottom:2.5px; left:6px; right:6px; border-radius:50%;
    background:conic-gradient(
      from 0deg,
      rgba(110,140,90,0.0) 0deg, rgba(110,140,90,0.10) 15deg, rgba(110,140,90,0.0) 30deg,
      rgba(110,140,90,0.0) 30deg, rgba(110,140,90,0.10) 45deg, rgba(110,140,90,0.0) 60deg,
      rgba(110,140,90,0.0) 60deg, rgba(110,140,90,0.10) 75deg, rgba(110,140,90,0.0) 90deg,
      rgba(110,140,90,0.0) 90deg, rgba(110,140,90,0.10) 105deg, rgba(110,140,90,0.0) 120deg,
      rgba(110,140,90,0.0) 120deg, rgba(110,140,90,0.10) 135deg, rgba(110,140,90,0.0) 150deg,
      rgba(110,140,90,0.0) 150deg, rgba(110,140,90,0.10) 165deg, rgba(110,140,90,0.0) 180deg,
      rgba(110,140,90,0.0) 180deg, rgba(110,140,90,0.10) 195deg, rgba(110,140,90,0.0) 210deg,
      rgba(110,140,90,0.0) 210deg, rgba(110,140,90,0.10) 225deg, rgba(110,140,90,0.0) 240deg,
      rgba(110,140,90,0.0) 240deg, rgba(110,140,90,0.10) 255deg, rgba(110,140,90,0.0) 270deg,
      rgba(110,140,90,0.0) 270deg, rgba(110,140,90,0.10) 285deg, rgba(110,140,90,0.0) 300deg,
      rgba(110,140,90,0.0) 300deg, rgba(110,140,90,0.10) 315deg, rgba(110,140,90,0.0) 330deg,
      rgba(110,140,90,0.0) 330deg, rgba(110,140,90,0.10) 345deg, rgba(110,140,90,0.0) 360deg
    );
    mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.35) 22%, rgba(0,0,0,0.12) 54%, transparent 74%);
    -webkit-mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.35) 22%, rgba(0,0,0,0.12) 54%, transparent 74%);
    opacity:0.32;
    animation:irisD 4.5s ease-in-out infinite;
  }

  /* 角膜缘 */
  .limbal {
    position:absolute; top:2px; bottom:2px; left:5.5px; right:5.5px; border-radius:50%;
    border:0.6px solid rgba(10,16,8,0.18);
    animation:irisD 4.5s ease-in-out infinite;
  }

  /* 瞳孔 */
  .pupil {
    position:absolute;
    top:9px; bottom:9px; left:11px; right:11px; border-radius:50%;
    background:radial-gradient(circle at 46% 38%,#1a1f16,#060a04 46%,#020302);
    animation:pupilD 4.5s ease-in-out infinite;
  }
  @keyframes pupilD {
    0%,100%{transform:translate(0,0.6px)}
    14%{transform:translate(-3px,-1.5px)}
    28%{transform:translate(2.5px,2.5px)}
    44%{transform:translate(-1.5px,-3.5px)}
    58%{transform:translate(3.8px,-0.3px)}
    72%{transform:translate(-3px,1.5px)}
    86%{transform:translate(1px,0)}
  }

  /* ── 十字星高光 — 精灵眼标志 ── */
  .sh1 {
    position:absolute; z-index:5;
    top:6px; left:11px;
    width:8px; height:8px;
    animation:sh1D 4.5s ease-in-out infinite;
  }
  .sh1::before, .sh1::after {
    content:''; position:absolute; background:white; border-radius:1px;
  }
  .sh1::before {
    width:2px; height:8px; left:3px; top:0;
    box-shadow:0 0 2px white,0 0 4px rgba(255,255,255,0.6);
  }
  .sh1::after {
    width:8px; height:2px; left:0; top:3px;
    box-shadow:0 0 2px white,0 0 4px rgba(255,255,255,0.6);
  }
  @keyframes sh1D {
    0%,100%{transform:translate(0,0.2px);opacity:0.80}
    14%{transform:translate(-2.5px,-0.8px);opacity:0.90}
    28%{transform:translate(1.8px,1.2px);opacity:0.72}
    44%{transform:translate(-0.8px,-2px);opacity:0.86}
    58%{transform:translate(2.5px,-0.2px);opacity:0.76}
    72%{transform:translate(-2px,0.8px);opacity:0.88}
    86%{transform:translate(0.4px,0);opacity:0.74}
  }

  /* 副高光 — 小圆点 */
  .sh2 {
    position:absolute; width:2.5px; height:2.5px; background:white; border-radius:50%;
    top:10px; left:19px; z-index:5;
    box-shadow:0 0 0.6px white;
    animation:sh2D 4.5s ease-in-out infinite;
  }
  @keyframes sh2D {
    0%,100%{transform:translate(0,0.2px);opacity:0.45}
    14%{transform:translate(-2px,-0.3px);opacity:0.54}
    28%{transform:translate(1.2px,0.8px);opacity:0.38}
    44%{transform:translate(-0.4px,-1.5px);opacity:0.50}
    58%{transform:translate(2px,0);opacity:0.40}
    72%{transform:translate(-1.5px,0.4px);opacity:0.52}
    86%{transform:translate(0.3px,0);opacity:0.42}
  }

  /* 环境反光 */
  .amb {
    position:absolute; width:3.5px; height:2px;
    background:rgba(200,225,190,0.40); border-radius:50%;
    bottom:7px; left:13px; z-index:5;
    filter:blur(0.8px);
    animation:ambD 4.5s ease-in-out infinite;
  }
  @keyframes ambD {
    0%,100%{transform:translate(0,0.2px);opacity:0.26}
    14%{transform:translate(-2.5px,-0.3px);opacity:0.34}
    28%{transform:translate(1.2px,1.2px);opacity:0.22}
    44%{transform:translate(-0.4px,-2px);opacity:0.32}
    58%{transform:translate(2px,-0.2px);opacity:0.24}
    72%{transform:translate(-1.5px,0.6px);opacity:0.34}
    86%{transform:translate(0.3px,0);opacity:0.23}
  }

  /* 上眼睑自然暗角 */
  .lid-shade {
    position:absolute; inset:1px; border-radius:50%; z-index:4;
    box-shadow:inset 0 3px 7px rgba(0,0,0,0.06);
    animation:irisD 4.5s ease-in-out infinite;
    pointer-events:none;
  }

  /* ── 上睫毛 — 细线，不遮挡 ── */
  .lashes {
    position:absolute; top:-3px; left:2px; right:2px; height:10px; z-index:6;
    pointer-events:none;
    animation:lashWink 4.5s ease-in-out infinite;
  }
  .lash {
    position:absolute; top:0; width:0.6px; background:rgba(60,55,40,0.30);
    border-radius:0 0 50% 50%;
    transform-origin:top center;
  }
  @keyframes lashWink {
    0%,41%,52%,100%{transform:scaleY(1)}
    46.5%{transform:scaleY(0.3)}
  }

  /* ── 笑眼微眯 — 下眼睑轻轻上推 ── */
  .smile-squint {
    position:absolute; bottom:-5px; left:-1px; right:-1px; height:7px; z-index:6;
    pointer-events:none;
    background:linear-gradient(to top, #e8ebe4 0%, rgba(232,235,228,0.3) 50%, transparent 100%);
    border-radius:50% 50% 0 0;
    animation:squint 5.5s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes squint {
    0%,56%,66%,100%{transform:scaleY(0.06)}
    61%{transform:scaleY(0.55)}
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="aura"></div>

    <!-- 精灵星点 -->
    <div class="sparkles">
      <span class="sp" style="left:14%;top:22%;width:2.5px;height:2.5px;--sd:2.1s;--dl:0s;--dx:-4px;--dy:-6px"></span>
      <span class="sp" style="left:22%;top:12%;width:1.8px;height:1.8px;--sd:2.6s;--dl:0.8s;--dx:3px;--dy:-8px"></span>
      <span class="sp" style="left:68%;top:18%;width:2.2px;height:2.2px;--sd:2.3s;--dl:1.5s;--dx:-5px;--dy:-7px"></span>
      <span class="sp" style="left:78%;top:28%;width:1.6px;height:1.6px;--sd:2.8s;--dl:2.2s;--dx:4px;--dy:-5px"></span>
      <span class="sp" style="left:42%;top:8%;width:2.0px;height:2.0px;--sd:3.0s;--dl:0.4s;--dx:-3px;--dy:-9px"></span>
      <span class="sp" style="left:56%;top:14%;width:1.5px;height:1.5px;--sd:2.4s;--dl:1.8s;--dx:6px;--dy:-6px"></span>
      <span class="sp" style="left:10%;top:40%;width:2.8px;height:2.8px;--sd:3.2s;--dl:0.6s;--dx:-6px;--dy:-4px"></span>
      <span class="sp" style="left:84%;top:35%;width:2.0px;height:2.0px;--sd:2.7s;--dl:2.5s;--dx:5px;--dy:-5px"></span>
    </div>

    <!-- 左眼 -->
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
      <div class="lashes">
        <span class="lash" style="left:8px;height:6px;transform:rotate(-8deg)"></span>
        <span class="lash" style="left:13px;height:7.5px;transform:rotate(-2deg)"></span>
        <span class="lash" style="left:18px;height:8px;transform:rotate(2deg)"></span>
        <span class="lash" style="left:23px;height:7px;transform:rotate(6deg)"></span>
        <span class="lash" style="left:28px;height:5.5px;transform:rotate(10deg)"></span>
      </div>
      <div class="smile-squint"></div>
    </div>

    <!-- 右眼 -->
    <div class="eye">
      <div class="socket"></div>
      <div class="sclera"></div>
      <div class="iris"></div>
      <div class="iris-tex"></div>
      <div class="limbal"></div>
      <div class="pupil"></div>
      <div class="amb"></div>
      <div class="sh1"></div>
      <div class="sh2"></div>
      <div class="lid-shade"></div>
      <div class="lashes">
        <span class="lash" style="left:8px;height:6px;transform:rotate(-8deg)"></span>
        <span class="lash" style="left:13px;height:7.5px;transform:rotate(-2deg)"></span>
        <span class="lash" style="left:18px;height:8px;transform:rotate(2deg)"></span>
        <span class="lash" style="left:23px;height:7px;transform:rotate(6deg)"></span>
        <span class="lash" style="left:28px;height:5.5px;transform:rotate(10deg)"></span>
      </div>
      <div class="smile-squint"></div>
    </div>
  </div>
</div>
</body>
</html>
