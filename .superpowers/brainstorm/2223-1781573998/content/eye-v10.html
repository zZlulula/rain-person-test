<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v10 — 可爱版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:40px; }
  .hint { font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  .eye-wrap { position:relative; width:200px; height:80px; display:flex; align-items:center; justify-content:center; gap:28px; }

  /* 柔光底 */
  .glow-bg {
    position:absolute; inset:-14px -8px; border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%, rgba(160,190,140,0.07) 0%, transparent 65%);
    animation:glowP 2.8s ease-in-out infinite;
  }
  @keyframes glowP { 0%,100%{opacity:0.4} 50%{opacity:0.85} }

  /* 单眼 — 大圆眼 */
  .eye {
    width:44px; height:44px;
    background:radial-gradient(ellipse at 50% 45%, #fdfefb 0%, #f3f5ed 55%, #e8ebe1 100%);
    border-radius:50%;
    position:relative;
    box-shadow:
      0 0 0 0.5px rgba(80,90,60,0.06),
      0 0 12px 2px rgba(100,120,80,0.05),
      inset 0 0.2px 0.5px rgba(0,0,0,0.02);
    overflow:hidden;
  }

  /* 腮红 — 眼下淡粉 */
  .blush {
    position:absolute;
    width:14px; height:6px;
    background:rgba(230,180,170,0.28);
    border-radius:50%;
    bottom:4px; left:15px;
    filter:blur(3px);
    animation:blushP 3s ease-in-out infinite;
  }
  @keyframes blushP { 0%,100%{opacity:0.5} 50%{opacity:0.85} }

  /* 虹膜 — 大占比 + 暖绿 */
  .iris {
    position:absolute;
    width:28px; height:28px;
    background:radial-gradient(circle at 40% 34%,
      #98b880 0%, #7a9a62 18%, #5a7a42 40%,
      #3a5228 62%, #1e2e14 100%);
    border-radius:50%;
    top:8px; left:8px;
    box-shadow:inset 0 1px 2px rgba(255,255,255,0.15);
    animation:drift 4.5s ease-in-out infinite;
  }
  @keyframes drift {
    0%,100%{transform:translate(0,0)}
    15%{transform:translate(-3px,-1px)}
    30%{transform:translate(2.5px,2px)}
    45%{transform:translate(-1.5px,-2.5px)}
    60%{transform:translate(3.5px,0)}
    75%{transform:translate(-2.5px,1.5px)}
    90%{transform:translate(1px,0)}
  }

  /* 瞳孔 — 大圆 */
  .pupil {
    position:absolute;
    width:14px; height:14px;
    background:radial-gradient(circle at 44% 38%, #1a1f15, #050804);
    border-radius:50%;
    top:7px; left:7px;
  }

  /* 主高光 — 大圆白点 */
  .h1 {
    position:absolute;
    width:7px; height:7px;
    background:white;
    border-radius:50%;
    top:1px; left:2px;
    box-shadow:0 0 3px rgba(255,255,255,0.7);
  }

  /* 副高光 — 小圆白点 */
  .h2 {
    position:absolute;
    width:3.5px; height:3.5px;
    background:white;
    border-radius:50%;
    top:7px; left:13px;
    box-shadow:0 0 1px rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="glow-bg"></div>
    <div class="eye">
      <div class="blush"></div>
      <div class="iris">
        <div class="pupil"></div>
        <div class="h1"></div>
        <div class="h2"></div>
      </div>
    </div>
    <div class="eye">
      <div class="blush"></div>
      <div class="iris">
        <div class="pupil"></div>
        <div class="h1"></div>
        <div class="h2"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
