<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重启按钮方案对比</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0f0a; font-family:'Microsoft YaHei','微软雅黑','PingFang SC',sans-serif; display:flex; height:100vh; }

.col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid #1a2a1a; position:relative; }
.col:last-child { border-right:none; }
.bg { position:absolute; inset:0; background:linear-gradient(180deg,#f8faf6,#f3f6f1 40%,#eef1ec); pointer-events:none; }
.bg::after { content:''; position:absolute; top:-20%; left:-20%; right:-20%; height:50%; background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.35),transparent 70%); }
.label { position:absolute; top:12px; left:0;right:0; text-align:center; font-size:10px; letter-spacing:2px; color:#5a7a5a; z-index:2; }
.label span { display:block; font-size:14px; color:#8aaa8a; }

.btn { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; cursor:pointer; }

/* A: 当前 */
.a .text { font-size:22px; font-weight:300; letter-spacing:8px; color:#d4c8a8; text-shadow:0 0 12px rgba(216,200,176,0.12), 0 0 24px rgba(204,192,160,0.06); }
.a .line { width:50px; height:1px; margin-top:6px; background:linear-gradient(90deg,transparent,rgba(216,204,176,0.25),transparent); }

/* A+ 增强烛光 */
.aplus .star {
  width:3px; height:3px; border-radius:50%;
  background:rgba(200,175,130,0.45);
  margin-bottom:14px;
  box-shadow:0 0 8px rgba(200,175,130,0.25);
  animation:apStar 3.2s ease-in-out infinite;
}
@keyframes apStar {
  0%,100% { opacity:0.40; transform:translateY(0) scale(1); }
  50% { opacity:0.85; transform:translateY(-5px) scale(1.8); box-shadow:0 0 16px rgba(200,175,130,0.40); }
}
.aplus .text {
  font-size:24px; font-weight:300; letter-spacing:10px;
  color:#c8b080;
  text-shadow:0 0 18px rgba(200,170,110,0.18), 0 0 40px rgba(180,150,80,0.10), 0 0 70px rgba(160,130,60,0.04);
  animation:apText 3.2s ease-in-out infinite;
}
@keyframes apText {
  0%,100% {
    color:#c8b080;
    text-shadow:0 0 18px rgba(200,170,110,0.18), 0 0 40px rgba(180,150,80,0.10);
    letter-spacing:10px;
  }
  50% {
    color:#e0cc90;
    text-shadow:0 0 28px rgba(220,190,120,0.28), 0 0 56px rgba(200,160,80,0.14), 0 0 90px rgba(180,140,60,0.06);
    letter-spacing:16px;
  }
}
.aplus .line {
  width:44px; height:1px; margin-top:10px;
  background:linear-gradient(90deg,transparent,rgba(200,170,100,0.18),rgba(200,170,100,0.35),rgba(200,170,100,0.18),transparent);
  animation:apLine 3.2s ease-in-out infinite;
}
@keyframes apLine {
  0%,100% { width:44px; opacity:0.7; }
  50% { width:68px; opacity:1; background:linear-gradient(90deg,transparent,rgba(220,185,110,0.28),rgba(220,185,110,0.50),rgba(220,185,110,0.28),transparent); }
}
/* 按钮光晕环 */
.aplus .ring {
  position:absolute; top:50%; left:50%;
  width:140px; height:50px;
  margin-left:-70px; margin-top:-25px;
  border-radius:50%;
  border:1px solid transparent;
  animation:apRing 3.2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes apRing {
  0%,100% { border-color:rgba(200,170,100,0); box-shadow:0 0 0 rgba(200,170,100,0); }
  50% { border-color:rgba(200,170,100,0.08); box-shadow:0 0 30px rgba(200,170,100,0.06); }
}

.desc { position:absolute; bottom:16px; font-size:10px; color:#8a9a8a; letter-spacing:1px; z-index:2; text-align:center; }
</style>
</head>
<body>

<div class="col a">
  <div class="bg"></div>
  <div class="label">A<span>当前</span></div>
  <div class="btn"><div class="text">重新体验</div><div class="line"></div></div>
  <div class="desc">#d4c8a8 静态</div>
</div>

<div class="col aplus">
  <div class="bg"></div>
  <div class="label">A+<span>增强烛光</span></div>
  <div class="btn" style="position:relative;">
    <div class="ring"></div>
    <div class="star"></div>
    <div class="text">重新体验</div>
    <div class="line"></div>
  </div>
  <div class="desc">呼吸星 + 暖金文字脉冲 + 字距呼吸<br>底线宽窄脉动 + 椭圆光环</div>
</div>

</body>
</html>
