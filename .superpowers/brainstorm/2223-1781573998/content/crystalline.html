<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清透水晶按钮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#c5cac0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:24px}

.phone{width:380px;background:#e8ebe4;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.03)}
.phone-inner{aspect-ratio:9/18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;overflow:hidden;background:linear-gradient(180deg,#e8ebe4 0%,#dfe5da 50%,#e8ebe4 100%)}

/* ═══ 清透水晶按钮 ═══
   理念：像一层薄冰 / 水滴表面
   正常态：几乎看不见，只有极淡的边界
   选中态：光注入其中，像水填满容器
*/
.crystal{
  position:relative;padding:13px 30px;border-radius:12px;
  /* 极细边框 + 微光内边 */
  border:0.5px solid rgba(58,74,63,.1);
  outline:0.5px solid rgba(255,255,255,.3);
  outline-offset:-2px;
  /* 几乎透明的底 */
  background:linear-gradient(135deg,
    rgba(255,255,255,.15) 0%,
    rgba(58,74,63,.02) 40%,
    rgba(255,255,255,.08) 100%);
  /* 内阴影模拟水晶折射 */
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.3),
    inset 0 -1px 0 rgba(58,74,63,.03);
  color:#3a4a3f;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .6s cubic-bezier(.16,1,.3,1);
}
.crystal:hover{
  border-color:rgba(58,74,63,.16);
  background:linear-gradient(135deg,
    rgba(255,255,255,.2) 0%,
    rgba(58,74,63,.03) 40%,
    rgba(255,255,255,.12) 100%);
}

/* 选中态：光注入 */
.crystal.sel{
  transform:scale(1.04);
  border-color:rgba(122,155,138,.35);
  outline-color:rgba(180,210,185,.35);
  background:linear-gradient(135deg,
    rgba(200,230,200,.18) 0%,
    rgba(122,155,138,.12) 30%,
    rgba(180,220,185,.1) 60%,
    rgba(255,255,255,.1) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.2),
    inset 0 -1px 0 rgba(122,155,138,.06),
    0 0 0 3px rgba(122,155,138,.06),
    0 0 0 10px rgba(122,155,138,.02),
    0 2px 20px rgba(122,155,138,.1);
  color:#3a4a3f;
}

/* 暗色背景上的水晶按钮 */
.crystal-dark{
  position:relative;padding:13px 30px;border-radius:12px;
  border:0.5px solid rgba(255,255,255,.12);
  outline:0.5px solid rgba(255,255,255,.06);
  outline-offset:-2px;
  background:linear-gradient(135deg,
    rgba(255,255,255,.06) 0%,
    rgba(255,255,255,.01) 40%,
    rgba(255,255,255,.04) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  color:#fff;font-family:inherit;font-size:16px;font-weight:300;letter-spacing:2px;
  cursor:pointer;outline:none;
  transition:all .6s cubic-bezier(.16,1,.3,1);
}
.crystal-dark.sel{
  transform:scale(1.04);
  border-color:rgba(122,155,138,.4);
  outline-color:rgba(180,210,185,.25);
  background:linear-gradient(135deg,
    rgba(160,210,170,.15) 0%,
    rgba(122,155,138,.1) 30%,
    rgba(140,190,150,.08) 60%,
    rgba(255,255,255,.04) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.15),
    0 0 0 3px rgba(122,155,138,.08),
    0 0 0 10px rgba(122,155,138,.025),
    0 2px 24px rgba(122,155,138,.15);
}

/* ═══ 入场动画 ═══ */
.mist-enter{opacity:0;transform:translateY(12px);filter:blur(4px)}
.mist-enter.go{animation:mistIn .7s cubic-bezier(.16,1,.3,1) forwards}
@keyframes mistIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}
.d0{animation-delay:0s}.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}

/* ═══ 星芒粒子 ═══ */
.star-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;animation:starBurst 1.4s cubic-bezier(.16,1,.3,1) forwards}
@keyframes starBurst{0%{opacity:1;transform:translate(0,0) scale(1)}60%{opacity:.4}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.ripple{position:fixed;border-radius:50%;border:.5px solid rgba(122,155,138,.2);pointer-events:none;z-index:9998;animation:ripOut .8s ease-out forwards}
@keyframes ripOut{0%{width:0;height:0;opacity:.4}100%{width:140px;height:140px;opacity:0;margin-left:-70px;margin-top:-70px}}

/* 红点标定 */
.calib-wrap{display:flex;flex-direction:column;align-items:center;gap:28px}
.calib-outer{width:130px;height:130px;border-radius:50%;border:.5px solid rgba(58,74,63,.06);display:flex;align-items:center;justify-content:center;animation:ringBreath 3.5s ease-in-out infinite}
.calib-mid{width:80px;height:80px;border-radius:50%;border:.5px dashed rgba(58,74,63,.08);display:flex;align-items:center;justify-content:center}
.calib-dot{width:12px;height:12px;border-radius:50%;background:#c4736e;box-shadow:0 0 20px rgba(196,115,110,.2),0 0 40px rgba(196,115,110,.06);animation:dotSoft 2.2s ease-in-out infinite}
@keyframes ringBreath{0%,100%{transform:scale(1);border-color:rgba(58,74,63,.04)}50%{transform:scale(1.05);border-color:rgba(58,74,63,.12)}}
@keyframes dotSoft{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.3);opacity:1}}

/* 云层加载 */
.cloud-bars{display:flex;gap:5px;align-items:flex-end}
.cloud-bar{width:3px;border-radius:1.5px;background:#7a9b8a;animation:cloudBreathe 3s ease-in-out infinite}
@keyframes cloudBreathe{0%,100%{opacity:.15}50%{opacity:.8}}

.replay-btn{
  padding:8px 22px;border-radius:20px;
  border:.5px solid rgba(58,74,63,.15);background:transparent;
  color:rgba(58,74,63,.5);font-family:inherit;font-size:11px;font-weight:300;letter-spacing:2px;cursor:pointer;
}
.replay-btn:hover{color:#3a4a3f;border-color:rgba(58,74,63,.25)}

.dark-bg{background:linear-gradient(180deg,#1a221d,#121a16 35%,#162018 65%,#0f1712)}
.mask{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:0}
</style>
</head>
<body>

<!-- ═══ 1. 首页：清透水晶 + 雾气浮现 ═══ -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:11px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.35)">首页 · 清透水晶按钮</div>
  <div style="display:flex;justify-content:center;margin-bottom:8px"><button class="replay-btn" onclick="replay('p1')">▶ 重播入场</button></div>
  <div class="phone"><div class="phone-inner" id="p1">
    <div class="mist-enter" style="font-size:32px;font-weight:200;letter-spacing:10px;color:#3a4a3f">雨 中 人</div>
    <div class="mist-enter" style="font-size:13px;font-weight:300;color:rgba(58,74,63,.45);letter-spacing:4px;margin-bottom:8px">一场关于内心世界的雨境之旅</div>
    <div class="mist-enter" style="display:flex;gap:16px">
      <button class="crystal" onclick="toggleSel(this)">皱眉</button>
      <button class="crystal" onclick="toggleSel(this)">抿嘴</button>
      <button class="crystal" onclick="toggleSel(this)">皱眉+抿嘴</button>
    </div>
    <div class="mist-enter" style="display:flex;gap:28px">
      <button class="crystal" style="font-size:19px;padding:16px 36px;letter-spacing:3px" onclick="toggleSel(this)">伞</button>
      <button class="crystal" style="font-size:19px;padding:16px 36px;letter-spacing:3px" onclick="toggleSel(this)">亭子</button>
    </div>
    <div class="mist-enter">
      <button class="crystal" style="padding:14px 48px;font-size:18px;letter-spacing:6px" onclick="toggleSel(this)">开 始</button>
    </div>
  </div></div>
</div>

<!-- ═══ 2. 暗色背景：视频页水晶按钮 ═══ -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:11px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.35)">视频页 · 暗色水晶</div>
  <div style="display:flex;justify-content:center;margin-bottom:8px"><button class="replay-btn" onclick="replay('p2')">▶ 重播入场</button></div>
  <div class="phone"><div class="phone-inner dark-bg" id="p2">
    <div class="mask"></div>
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px">
      <div class="mist-enter" style="color:#fff;font-size:18px;font-weight:300;text-align:center;line-height:1.7;letter-spacing:1px;max-width:280px">
        你遇到了一位朋友，<br>想象你在和他解释你的烦恼
      </div>
      <div class="mist-enter" style="display:flex;gap:16px">
        <button class="crystal-dark" onclick="toggleSel(this)">皱眉</button>
        <button class="crystal-dark" onclick="toggleSel(this)">抿嘴</button>
        <button class="crystal-dark" onclick="toggleSel(this)">皱眉+抿嘴</button>
      </div>
      <div class="mist-enter" style="display:flex;gap:32px">
        <button class="crystal-dark" style="font-size:20px;padding:16px 38px;letter-spacing:3px" onclick="toggleSel(this)">伞</button>
        <button class="crystal-dark" style="font-size:20px;padding:16px 38px;letter-spacing:3px" onclick="toggleSel(this)">亭子</button>
      </div>
    </div>
  </div></div>
</div>

<!-- ═══ 3. 标定页 ═══ -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:11px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.35)">标定页 · 呼吸光点</div>
  <div class="phone"><div class="phone-inner calib-wrap" style="background:linear-gradient(180deg,#e8ebe4,#dde2d8)">
    <div class="mist-enter go d0" style="font-size:17px;font-weight:300;letter-spacing:2px;text-align:center;line-height:1.8;padding:0 30px">放松自己，测试全程看着屏幕</div>
    <div class="calib-outer mist-enter go d1">
      <div class="calib-mid"><div class="calib-dot"></div></div>
    </div>
    <div class="mist-enter go d2" style="font-size:13px;font-weight:300;color:rgba(58,74,63,.4);letter-spacing:3px">看着光点，正在标定...</div>
  </div></div>
</div>

<!-- ═══ 4. 加载页 ═══ -->
<div>
  <div style="text-align:center;margin-bottom:6px;font-size:11px;font-weight:300;letter-spacing:3px;color:rgba(58,74,63,.35)">加载过渡 · 云层呼吸</div>
  <div class="phone"><div class="phone-inner" style="background:#000;display:flex;align-items:center;justify-content:center">
    <div class="cloud-bars"><div class="cloud-bar" style="height:26px;animation-delay:0s"></div><div class="cloud-bar" style="height:36px;animation-delay:.3s"></div><div class="cloud-bar" style="height:20px;animation-delay:.6s"></div><div class="cloud-bar" style="height:32px;animation-delay:.9s"></div><div class="cloud-bar" style="height:24px;animation-delay:1.2s"></div></div>
    <span style="color:rgba(122,155,138,.7);font-size:18px;font-weight:300;letter-spacing:3px;margin-left:14px;animation:cloudBreathe 3s ease-in-out infinite">正在生成报告</span>
  </div></div>
</div>

<script>
document.querySelectorAll('[id^="p"]').forEach(el=>replay(el.id));

function replay(id){
  const el=document.getElementById(id);
  el.querySelectorAll('.mist-enter').forEach((item,i)=>{
    item.classList.remove('go','d0','d1','d2','d3','d4','d5');
    item.style.animation='none';item.offsetHeight;item.style.animation='';
  });
  requestAnimationFrame(()=>{
    el.querySelectorAll('.mist-enter').forEach((item,i)=>{
      item.classList.add('go','d'+Math.min(i,5));
    });
  });
}

function toggleSel(btn){
  const was=btn.classList.contains('sel');
  const p=btn.parentElement;
  if(p) p.querySelectorAll('.sel').forEach(b=>{if(b!==btn)b.classList.remove('sel')});
  btn.classList.toggle('sel');
  if(!was) burst(btn);
}

function burst(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='star-particle';
    const angle=(i/20)*Math.PI*2+(Math.random()-.5)*.2;
    const dist=35+Math.random()*45;
    p.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;width:${1.5+Math.random()*2}px;height:${1.5+Math.random()*2}px;background:${Math.random()>.5?'#d0ead0':'rgba(255,255,255,.9)'};animation-delay:${Math.random()*.1}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
  const r=document.createElement('div');r.className='ripple';r.style.left=cx+'px';r.style.top=cy+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),800);
}
</script>
</body>
</html>
