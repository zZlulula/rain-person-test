<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水墨风格按钮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#0d1110;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:24px}

.row{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:center}
.scene{background:linear-gradient(180deg,#1a1c1b,#141716 40%,#181b19 70%,#111312);border-radius:20px;padding:36px 28px;position:relative;overflow:hidden;min-width:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.mask{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:0}
.scene>*{position:relative;z-index:1}
h2{font-weight:200;letter-spacing:6px;font-size:16px;margin-bottom:4px}
.tag{font-size:10px;opacity:.35;letter-spacing:3px;margin-bottom:16px}
.hint{font-size:13px;font-weight:300;opacity:.5;letter-spacing:1px;text-align:center;max-width:260px;line-height:1.7}
.note{font-size:10px;opacity:.2;letter-spacing:2px;margin-top:4px}

/* ═══════════════════════════════════════════
   水墨按钮
   理念：
   - 正常态：极淡的墨线勾勒，像铅笔草稿
   - Hover：墨线微微加深
   - 选中态：淡墨晕染填充，像毛笔轻点宣纸
   - 粒子：墨点飞溅
   ═══════════════════════════════════════════ */

.ink-btn{
  position:relative;padding:12px 28px;border-radius:8px;
  cursor:pointer;font-size:16px;font-weight:300;letter-spacing:2px;
  font-family:inherit;outline:none;user-select:none;
  /* 正常态：极淡暖灰边框，像铅笔线 */
  border:.5px solid rgba(255,255,255,.1);
  background:transparent;
  color:rgba(255,255,255,.65);
  transition:all .6s cubic-bezier(.16,1,.3,1);
}
.ink-btn:hover{
  border-color:rgba(255,255,255,.22);
  color:rgba(255,255,255,.85);
}
/* 选中态：淡墨晕染 */
.ink-btn.sel{
  transform:scale(1.03);
  border-color:rgba(255,255,255,.25);
  /* 暖灰调墨色晕染 */
  background:linear-gradient(180deg,
    rgba(180,170,160,.12) 0%,
    rgba(160,150,140,.06) 50%,
    rgba(140,130,120,.02) 100%);
  color:rgba(255,255,255,.9);
  border-radius:10px;
  box-shadow:
    inset 0 0 30px rgba(180,170,160,.04),
    0 0 0 2px rgba(200,190,180,.04),
    0 2px 16px rgba(0,0,0,.2);
  /* 模拟墨迹边缘的微扩散 */
  outline:1px solid rgba(200,195,185,.06);
  outline-offset:3px;
}

/* ═══ 变体：宣纸质感（浅色底） ═══ */
.scene-light{background:linear-gradient(180deg,#e8ebe4 0%,#dfe5da 50%,#e8ebe4 100%)}
.ink-btn-light{
  position:relative;padding:12px 28px;border-radius:8px;
  cursor:pointer;font-size:16px;font-weight:300;letter-spacing:2px;
  font-family:inherit;outline:none;user-select:none;
  border:.5px solid rgba(58,74,63,.1);
  background:transparent;
  color:rgba(58,74,63,.55);
  transition:all .6s cubic-bezier(.16,1,.3,1);
}
.ink-btn-light:hover{
  border-color:rgba(58,74,63,.2);
  color:rgba(58,74,63,.75);
}
.ink-btn-light.sel{
  transform:scale(1.03);
  border-color:rgba(58,74,63,.28);
  background:linear-gradient(180deg,
    rgba(140,135,125,.06) 0%,
    rgba(120,115,105,.03) 50%,
    rgba(100,95,85,.01) 100%);
  color:rgba(58,74,63,.85);
  box-shadow:
    inset 0 0 20px rgba(140,135,125,.03),
    0 2px 12px rgba(0,0,0,.04);
  outline:1px solid rgba(58,74,63,.04);
  outline-offset:3px;
}

/* ═══ 墨点粒子 ═══ */
.ink-spark{
  position:fixed;border-radius:50%;pointer-events:none;z-index:999;
  animation:inkBurst 1.3s ease-out forwards;
}
@keyframes inkBurst{
  0%{opacity:.7;transform:translate(0,0) scale(1)}
  60%{opacity:.3}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}

/* ═══ 宣纸粒子（浅色底） ═══ */
.ink-spark-light{
  position:fixed;border-radius:50%;pointer-events:none;z-index:999;
  animation:inkBurstLight 1.3s ease-out forwards;
}
@keyframes inkBurstLight{
  0%{opacity:.5;transform:translate(0,0) scale(1)}
  60%{opacity:.25}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
</style>
</head>
<body>

<!-- ═══ 暗色底（视频页） ═══ -->
<div style="text-align:center">
  <h2>水墨 · 暗色视频页</h2>
  <div class="tag">铅笔勾线 → 淡墨晕染</div>
</div>
<div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center">
  <div class="scene">
    <div class="mask"></div>
    <div class="hint">你遇到了一位朋友，<br>想象你在和他解释你的烦恼</div>
    <div class="row">
      <button class="ink-btn" onclick="toggleInk(this,'dark')">皱眉</button>
      <button class="ink-btn" onclick="toggleInk(this,'dark')">抿嘴</button>
      <button class="ink-btn" onclick="toggleInk(this,'dark')">皱眉+抿嘴</button>
    </div>
    <div class="row">
      <button class="ink-btn" style="font-size:20px;padding:15px 36px" onclick="toggleInk(this,'dark')">伞</button>
      <button class="ink-btn" style="font-size:20px;padding:15px 36px" onclick="toggleInk(this,'dark')">亭子</button>
    </div>
    <div class="note">点击看墨染选中 + 墨点飞溅</div>
  </div>
</div>

<!-- ═══ 浅色底（首页/报告页） ═══ -->
<div style="text-align:center;margin-top:8px">
  <h2 style="color:rgba(0,0,0,.5)">水墨 · 浅色纸页</h2>
  <div class="tag" style="color:rgba(0,0,0,.25)">宣纸质感</div>
</div>
<div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center">
  <div class="scene scene-light">
    <div class="hint" style="color:rgba(58,74,63,.45)">一场关于内心世界的雨境之旅</div>
    <div class="row">
      <button class="ink-btn-light" onclick="toggleInk(this,'light')">皱眉</button>
      <button class="ink-btn-light" onclick="toggleInk(this,'light')">抿嘴</button>
      <button class="ink-btn-light" onclick="toggleInk(this,'light')">皱眉+抿嘴</button>
    </div>
    <div class="row">
      <button class="ink-btn-light" style="font-size:20px;padding:15px 36px" onclick="toggleInk(this,'light')">伞</button>
      <button class="ink-btn-light" style="font-size:20px;padding:15px 36px" onclick="toggleInk(this,'light')">亭子</button>
    </div>
    <div style="margin-top:12px">
      <button class="ink-btn-light" style="font-size:19px;padding:15px 48px;letter-spacing:6px" onclick="toggleInk(this,'light')">开 始</button>
    </div>
    <div class="note" style="color:rgba(0,0,0,.15)">点击看墨染选中</div>
  </div>
</div>

<script>
function toggleInk(btn, mode){
  const was=btn.classList.contains('sel');
  const row=btn.parentElement;
  row.querySelectorAll('.sel').forEach(b=>b.classList.remove('sel'));
  btn.classList.toggle('sel');
  if(!was){
    const rect=btn.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const cls=mode==='light'?'ink-spark-light':'ink-spark';
    for(let i=0;i<18;i++){
      const p=document.createElement('div');p.className=cls;
      const a=(i/18)*Math.PI*2+(Math.random()-.5)*.3;
      const d=30+Math.random()*40;
      p.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;width:${1.5+Math.random()*2}px;height:${1.5+Math.random()*2}px;background:${mode==='light'?'rgba(120,110,100,.4)':'rgba(200,195,185,.5)'};animation-delay:${Math.random()*.1}s`;
      document.body.appendChild(p);setTimeout(()=>p.remove(),1400);
    }
  }
}
</script>
</body>
</html>
