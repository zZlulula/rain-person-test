<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼睛 v15 — 电子宠物屏</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#e8ebe4;
    font-family:'Microsoft YaHei',sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }
  .scene { display:flex; flex-direction:column; align-items:center; gap:42px; }
  .hint {
    font-size:28px; color:#2a3a2e; letter-spacing:3px; font-weight:300;
    animation:hf 3s ease-in-out infinite;
  }
  @keyframes hf { 0%,100%{opacity:0.50} 50%{opacity:0.88} }

  /* ═══════════════ 双屏容器 ═══════════════ */
  .screen-wrap {
    position:relative; width:200px; height:100px;
    display:flex; align-items:center; justify-content:center; gap:32px;
    animation:scanArc 5.5s ease-in-out infinite;
  }
  /* 弧形扫描轨迹 */
  @keyframes scanArc {
    0%,100%{transform:translate(0,0) rotate(0deg)}
    18%{transform:translate(-8px,-3px) rotate(-2deg)}
    38%{transform:translate(9px,2px) rotate(2.5deg)}
    56%{transform:translate(-4px,-1px) rotate(-1deg)}
    74%{transform:translate(5px,1px) rotate(1.5deg)}
    88%{transform:translate(-2px,0) rotate(-0.5deg)}
  }

  /* ═══════════════ 单个圆形显示屏 ═══════════════ */
  .screen {
    width:50px; height:50px;
    border-radius:50%;
    position:relative;
    /* 磨砂玻璃 */
    background:radial-gradient(ellipse at 45% 40%,
      rgba(255,248,235,0.50) 0%,
      rgba(255,235,215,0.30) 40%,
      rgba(245,220,200,0.18) 100%);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    /* 边缘柔光 */
    border:1.5px solid rgba(255,240,220,0.45);
    box-shadow:
      0 0 14px 3px rgba(255,200,160,0.35),
      0 0 30px 6px rgba(255,185,150,0.18),
      0 0 50px 10px rgba(255,170,140,0.08),
      inset 0 0 12px rgba(255,240,210,0.30);
    /* 屏幕微呼吸 */
    animation:screenBreathe 2.6s ease-in-out infinite;
    overflow:hidden;
  }
  @keyframes screenBreathe {
    0%,100%{
      box-shadow:
        0 0 14px 3px rgba(255,200,160,0.35),
        0 0 30px 6px rgba(255,185,150,0.18),
        0 0 50px 10px rgba(255,170,140,0.08),
        inset 0 0 12px rgba(255,240,210,0.30);
    }
    52%{
      box-shadow:
        0 0 18px 4px rgba(255,210,170,0.45),
        0 0 36px 8px rgba(255,195,155,0.24),
        0 0 56px 12px rgba(255,175,145,0.10),
        inset 0 0 16px rgba(255,245,220,0.40);
    }
  }

  /* ═══════════════ 像素眼睛 ═══════════════ */
  .pixel-eye {
    position:absolute;
    inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  /* 常态：两个像素圆点 ● ● */
  .dots {
    display:flex; gap:6px;
    animation:blinkDots 4.0s ease-in-out infinite;
  }
  .dots span {
    display:block;
    width:7px; height:7px;
    border-radius:2px; /* 微微圆角的像素方块 */
    background:#5a4030;
    box-shadow:0 0 3px rgba(90,64,48,0.25);
  }
  @keyframes blinkDots {
    0%,44%,54%,100%{transform:scaleY(1);opacity:1}
    49%{transform:scaleY(0.08);opacity:0.3}
  }

  /* 可选：^ ^ 微笑眼（备用，通过 class 切换） */
  .happy {
    display:none; gap:5px;
  }
  .happy span {
    display:block;
    width:7px; height:4px;
    border-bottom:2px solid #5a4030;
    border-radius:0 0 50% 50%;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="screen-wrap">
    <!-- 左屏 -->
    <div class="screen">
      <div class="pixel-eye">
        <div class="dots">
          <span></span><span></span>
        </div>
      </div>
    </div>
    <!-- 右屏 -->
    <div class="screen">
      <div class="pixel-eye">
        <div class="dots">
          <span></span><span></span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
