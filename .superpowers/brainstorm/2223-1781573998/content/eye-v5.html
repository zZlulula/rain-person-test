<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻光双瞳 v5 — 修复版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8ebe4; font-family:'Microsoft YaHei',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .scene { display:flex; flex-direction:column; align-items:center; gap:45px; }
  .hint { font-size:30px; color:#2a3a2e; letter-spacing:3px; font-weight:300; animation:hf 3s ease-in-out infinite; }
  @keyframes hf { 0%,100%{opacity:0.55} 50%{opacity:0.90} }

  .eye-wrap {
    position:relative; width:200px; height:100px;
    display:flex; align-items:center; justify-content:center; gap:26px;
  }

  /* 辉光背景 */
  .aura-bg {
    position:absolute; inset:-20px -14px; border-radius:50%;
    background:
      radial-gradient(ellipse at 35% 48%, rgba(145,175,125,0.16) 0%, transparent 48%),
      radial-gradient(ellipse at 65% 48%, rgba(145,175,125,0.16) 0%, transparent 48%),
      radial-gradient(ellipse at 50% 50%, rgba(180,200,160,0.07) 0%, transparent 70%);
    animation:auraPulse 3.2s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes auraPulse { 0%,100%{opacity:0.3;filter:blur(3px)} 55%{opacity:0.85;filter:blur(7px)} }

  /* 单眼容器 */
  .eye { position:relative; width:42px; height:30px; z-index:1; }

  /* 眼白 */
  .sclera {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(ellipse at 50% 44%, #f5f7f0 0%, #eaefe4 42%, #dde3d6 100%);
    box-shadow:inset 0 1px 2px rgba(255,255,255,0.55);
  }

  /* 虹膜 */
  .iris-bg {
    position:absolute;
    top:4px; bottom:4px; left:6px; right:6px;
    border-radius:50%;
    background:radial-gradient(circle at 43% 36%,
      #6b7d58 0%, #4c5c42 18%, #3a4a32 35%,
      #2c3a26 55%, #1e2a1a 75%, #0b1008 100%);
    box-shadow:
      inset 0 1.5px 2px rgba(255,255,255,0.15),
      inset 0 -2px 4px rgba(0,0,0,0.30),
      0 0 1px rgba(0,0,0,0.15);
    animation:irisDrift 4.8s ease-in-out infinite;
  }
  @keyframes irisDrift {
    0%,100%{transform:translate(0,0.5px)}
    14%{transform:translate(-3.5px,-1.5px)}
    28%{transform:translate(2.5px,2.5px)}
    44%{transform:translate(-1.5px,-3px)}
    58%{transform:translate(3.5px,-0.5px)}
    72%{transform:translate(-3px,1.5px)}
    86%{transform:translate(1px,0)}
  }

  /* 虹膜纹理 */
  .iris-texture {
    position:absolute;
    top:4px; bottom:4px; left:6px; right:6px; border-radius:50%;
    background:conic-gradient(
      from 0deg,
      rgba(90,110,72,0.0) 0deg, rgba(90,110,72,0.16) 15deg, rgba(90,110,72,0.0) 30deg,
      rgba(90,110,72,0.0) 30deg, rgba(90,110,72,0.16) 45deg, rgba(90,110,72,0.0) 60deg,
      rgba(90,110,72,0.0) 60deg, rgba(90,110,72,0.16) 75deg, rgba(90,110,72,0.0) 90deg,
      rgba(90,110,72,0.0) 90deg, rgba(90,110,72,0.16) 105deg, rgba(90,110,72,0.0) 120deg,
      rgba(90,110,72,0.0) 120deg, rgba(90,110,72,0.16) 135deg, rgba(90,110,72,0.0) 150deg,
      rgba(90,110,72,0.0) 150deg, rgba(90,110,72,0.16) 165deg, rgba(90,110,72,0.0) 180deg,
      rgba(90,110,72,0.0) 180deg, rgba(90,110,72,0.16) 195deg, rgba(90,110,72,0.0) 210deg,
      rgba(90,110,72,0.0) 210deg, rgba(90,110,72,0.16) 225deg, rgba(90,110,72,0.0) 240deg,
      rgba(90,110,72,0.0) 240deg, rgba(90,110,72,0.16) 255deg, rgba(90,110,72,0.0) 270deg,
      rgba(90,110,72,0.0) 270deg, rgba(90,110,72,0.16) 285deg, rgba(90,110,72,0.0) 300deg,
      rgba(90,110,72,0.0) 300deg, rgba(90,110,72,0.16) 315deg, rgba(90,110,72,0.0) 330deg,
      rgba(90,110,72,0.0) 330deg, rgba(90,110,72,0.16) 345deg, rgba(90,110,72,0.0) 360deg
    );
    mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.5) 22%, rgba(0,0,0,0.25) 52%, transparent 72%);
    -webkit-mask-image:radial-gradient(circle, transparent 0%, rgba(0,0,0,0.5) 22%, rgba(0,0,0,0.25) 52%, transparent 72%);
    opacity:0.40;
    animation:irisDrift 4.8s ease-in-out infinite;
  }

  /* 角膜缘环 */
  .limbal-ring {
    position:absolute;
    top:3.5px; bottom:3.5px; left:5.5px; right:5.5px; border-radius:50%;
    border:1px solid rgba(10,16,8,0.30);
    box-shadow:inset 0 0 2px rgba(0,0,0,0.20);
    animation:irisDrift 4.8s ease-in-out infinite;
  }

  /* 瞳孔 */
  .pupil {
    position:absolute;
    top:9px; bottom:9px; left:11px; right:11px; border-radius:50%;
    background:radial-gradient(circle at 48% 42%, #1a1f16, #0a0e08 42%, #020302);
    box-shadow:0 0 1px rgba(0,0,0,0.4);
    animation:pupilDrift 4.8s ease-in-out infinite;
  }
  @keyframes pupilDrift {
    0%,100%{transform:translate(0,1px)}
    14%{transform:translate(-4px,-2px)}
    28%{transform:translate(3px,3px)}
    44%{transform:translate(-2px,-4px)}
    58%{transform:translate(4.5px,-0.5px)}
    72%{transform:translate(-3.5px,2px)}
    86%{transform:translate(1px,0)}
  }

  /* 主高光 */
  .shine1 {
    position:absolute; width:6px; height:6px; background:white; border-radius:50%;
    top:7px; left:12px; z-index:5;
    box-shadow:0 0 2px white,0 0 7px rgba(255,255,255,0.55);
    animation:shine1Drift 4.8s ease-in-out infinite;
  }
  @keyframes shine1Drift {
    0%,100%{transform:translate(0,0.3px);opacity:0.88}
    14%{transform:translate(-3px,-1px);opacity:0.94}
    28%{transform:translate(2px,1.5px);opacity:0.82}
    44%{transform:translate(-1px,-2.5px);opacity:0.90}
    58%{transform:translate(3px,-0.3px);opacity:0.86}
    72%{transform:translate(-2.5px,1px);opacity:0.92}
    86%{transform:translate(0.5px,0);opacity:0.84}
  }

  /* 副高光 */
  .shine2 {
    position:absolute; width:3px; height:3px; background:white; border-radius:50%;
    top:10px; left:19px; z-index:5;
    box-shadow:0 0 1px white;
    animation:shine2Drift 4.8s ease-in-out infinite;
  }
  @keyframes shine2Drift {
    0%,100%{transform:translate(0,0.3px);opacity:0.52}
    14%{transform:translate(-2.5px,-0.5px);opacity:0.60}
    28%{transform:translate(1.5px,1px);opacity:0.46}
    44%{transform:translate(-0.5px,-2px);opacity:0.56}
    58%{transform:translate(2.5px,0);opacity:0.48}
    72%{transform:translate(-2px,0.5px);opacity:0.58}
    86%{transform:translate(0.3px,0);opacity:0.50}
  }

  /* 环境反光 */
  .ambient-reflect {
    position:absolute; width:4px; height:2.5px;
    background:rgba(218,232,208,0.48); border-radius:50%;
    bottom:8px; left:12px; z-index:5;
    filter:blur(1.2px);
    animation:ambDrift 4.8s ease-in-out infinite;
  }
  @keyframes ambDrift {
    0%,100%{transform:translate(0,0.3px);opacity:0.32}
    14%{transform:translate(-3px,-0.5px);opacity:0.40}
    28%{transform:translate(1.5px,1.5px);opacity:0.28}
    44%{transform:translate(-0.5px,-2.5px);opacity:0.38}
    58%{transform:translate(2.5px,-0.3px);opacity:0.30}
    72%{transform:translate(-2px,0.8px);opacity:0.40}
    86%{transform:translate(0.3px,0);opacity:0.30}
  }

  /* 上眼睑阴影 */
  .lid-shadow {
    position:absolute; inset:2px; border-radius:50%; z-index:4;
    box-shadow:inset 0 3px 10px rgba(0,0,0,0.11);
    animation:irisDrift 4.8s ease-in-out infinite;
    pointer-events:none;
  }

  /* 眨眼上眼睑 — 仅画在眼睛上半部，柔和弧形 */
  .lid {
    position:absolute; top:-10px; left:-4px; right:-4px; height:50%;
    background:#e8ebe4;
    z-index:6; pointer-events:none;
    border-radius:0 0 50% 50%;
    animation:blink 4.5s ease-in-out infinite;
    transform-origin:top center;
  }
  @keyframes blink {
    0%,41%,51%,100%{transform:scaleY(0.04)}
    46%{transform:scaleY(1.08)}
  }

  /* 下眼睑微动 */
  .lid-lower {
    position:absolute; bottom:-8px; left:-3px; right:-3px; height:6px;
    background:#e8ebe4;
    z-index:6; pointer-events:none;
    border-radius:50% 50% 0 0;
    animation:blinkLower 4.5s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes blinkLower {
    0%,40%,52%,100%{transform:scaleY(0.06)}
    46.5%{transform:scaleY(0.50)}
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint">看着红点，现在开始标定</div>
  <div class="eye-wrap">
    <div class="aura-bg"></div>
    <div class="eye">
      <div class="sclera"></div>
      <div class="iris-bg"></div>
      <div class="iris-texture"></div>
      <div class="limbal-ring"></div>
      <div class="pupil"></div>
      <div class="ambient-reflect"></div>
      <div class="shine1"></div>
      <div class="shine2"></div>
      <div class="lid-shadow"></div>
      <div class="lid"></div>
      <div class="lid-lower"></div>
    </div>
    <div class="eye">
      <div class="sclera"></div>
      <div class="iris-bg"></div>
      <div class="iris-texture"></div>
      <div class="limbal-ring"></div>
      <div class="pupil"></div>
      <div class="ambient-reflect"></div>
      <div class="shine1"></div>
      <div class="shine2"></div>
      <div class="lid-shadow"></div>
      <div class="lid"></div>
      <div class="lid-lower"></div>
    </div>
  </div>
</div>
</body>
</html>
