<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨后初晴 · 全页面预览</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'ZCOOL XiaoWei','Noto Sans SC','Microsoft YaHei',serif;
  background:#c5cac0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:20px;
}
.phone{width:380px;background:#e8ebe4;border-radius:32px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.14)}

/* ═══ 页面容器 ═══ */
.page{display:none;aspect-ratio:9/18.5;position:relative;overflow:hidden}
.page.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ═══ P1: 首页 ═══ */
.p1-bg{background:linear-gradient(180deg,#e8ebe4 0%,#dfe5da 55%,#e8ebe4 100%)}
.title-float{
  font-size:32px;font-weight:400;letter-spacing:8px;color:rgba(60,80,65,.75);
  animation:titleBreath 4s ease-in-out infinite;font-family:inherit;
}
@keyframes titleBreath{0%,100%{letter-spacing:8px}50%{letter-spacing:11px}}
.sub{font-size:13px;color:rgba(90,110,95,.4);letter-spacing:4px;margin-bottom:48px;margin-top:10px}

/* ═══ P2: 标定 ═══ */
.p2-bg{background:linear-gradient(180deg,#e8ebe4,#dde2d8)}
.p2-text{font-size:16px;font-weight:400;letter-spacing:2px;color:rgba(80,100,85,.55);text-align:center;line-height:2;padding:0 30px;margin-bottom:36px}
.calib-ring{width:120px;height:120px;border-radius:50%;border:.5px solid rgba(80,100,85,.08);display:flex;align-items:center;justify-content:center;animation:ringBreath 3s ease-in-out infinite}
@keyframes ringBreath{0%,100%{transform:scale(1);border-color:rgba(80,100,85,.06)}50%{transform:scale(1.06);border-color:rgba(80,100,85,.14)}}
.calib-cross{position:relative;width:50px;height:50px}
.calib-cross::before,.calib-cross::after{content:'';position:absolute;background:rgba(80,100,85,.12)}
.calib-cross::before{top:0;left:50%;width:.5px;height:100%}
.calib-cross::after{left:0;top:50%;height:.5px;width:100%}
.calib-dot{width:8px;height:8px;border-radius:50%;background:#c4a090;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(180,140,120,.25)}.calib-label{font-size:13px;color:rgba(80,100,85,.35);letter-spacing:3px;margin-top:24px}

/* ═══ P3-P5: 视频页 ═══ */
.vid-bg{background:linear-gradient(180deg,rgba(42,50,44,.88),rgba(38,46,40,.85) 40%,rgba(44,52,46,.86) 100%);position:relative}
.vid-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(180,200,175,.04),transparent 50%),radial-gradient(ellipse at 65% 55%,rgba(200,215,195,.025),transparent 40%);z-index:0}
.mask-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:0}
.vid-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:30px 20px}
.vid-hint{font-size:14px;font-weight:400;text-align:center;max-width:270px;line-height:2.1;letter-spacing:2px;color:rgba(210,225,210,.45)}

/* ═══ 按钮通用 ═══ */
.mist-btn{
  position:relative;padding:10px 22px;cursor:pointer;font-size:17px;font-weight:400;letter-spacing:3px;
  font-family:inherit;outline:none;border:none;background:none;
  transition:all .7s cubic-bezier(.16,1,.3,1);
}
.mist-dark{color:rgba(205,222,202,.32)}
.mist-dark:hover{color:rgba(215,232,212,.5)}
.mist-dark.sel{color:rgba(230,242,225,.85);letter-spacing:4px}
.mist-light{color:rgba(90,112,95,.28)}
.mist-light:hover{color:rgba(80,102,85,.45)}
.mist-light.sel{color:rgba(55,75,60,.75);letter-spacing:4px}
.mist-btn .halo{position:absolute;inset:-10px -16px;border-radius:28px;z-index:-1;pointer-events:none;opacity:0;transition:opacity .8s ease}
.mist-dark .halo{background:radial-gradient(ellipse at center,rgba(205,225,200,.065),rgba(185,210,180,.02) 35%,transparent 65%)}
.mist-dark.sel .halo{opacity:1}
.mist-light .halo{background:radial-gradient(ellipse at center,rgba(145,170,140,.055),rgba(125,155,120,.018) 35%,transparent 65%)}
.mist-light.sel .halo{opacity:1}
.dust-box{position:absolute;inset:-8px -12px;z-index:-1;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .8s ease}
.sel .dust-box{opacity:1}
.dust{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp var(--dur) ease-out infinite;animation-delay:var(--delay);width:var(--size);height:var(--size);left:var(--x);bottom:-6px;opacity:0}
.dust-dark{background:rgba(195,220,190,.4)}.dust-light{background:rgba(135,165,130,.28)}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) translateX(0)}15%{opacity:.5}60%{opacity:.2}100%{opacity:0;transform:translateY(calc(-1 * var(--rise))) translateX(var(--drift))}}
.mist-dark.sel::after,.mist-light.sel::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.025) 47%,rgba(255,255,255,.008) 50%,transparent 65%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-100% 0}}

.row{display:flex;gap:30px;justify-content:center;align-items:center;flex-wrap:wrap}

/* ═══ P6: 加载 ═══ */
.load-bg{background:linear-gradient(180deg,rgba(42,50,44,.92),rgba(38,46,40,.9),rgba(44,52,46,.92))}
.load-cloud{display:flex;gap:5px;align-items:flex-end;margin-bottom:18px}
.load-bar{width:3px;border-radius:1.5px;background:rgba(180,205,175,.5);animation:cloudBreathe 2.6s ease-in-out infinite}
@keyframes cloudBreathe{0%,100%{opacity:.12;transform:scaleY(.6)}50%{opacity:.7;transform:scaleY(1)}}
.load-text{font-size:17px;font-weight:400;letter-spacing:4px;color:rgba(200,220,195,.55);animation:cloudBreathe 2.6s ease-in-out infinite;font-family:inherit}

/* ═══ P7: 报告 ═══ */
.p7-bg{background:linear-gradient(180deg,#e8ebe4,#e1e6dc 50%,#e8ebe4)}
.p7-inner{width:100%;height:100%;overflow-y:auto;padding:34px 22px 40px;display:flex;flex-direction:column;align-items:center}
.p7-title{font-size:21px;font-weight:400;letter-spacing:4px;color:rgba(60,80,65,.7);text-align:center;margin-bottom:12px}
.p7-summary{font-size:13px;color:rgba(80,100,85,.4);text-align:center;line-height:1.9;margin-bottom:24px;padding:0 4px}
.card{width:100%;padding:16px 18px;border-radius:14px;margin-bottom:10px;background:rgba(255,255,255,.35);border:.5px solid rgba(80,100,85,.06);box-shadow:0 1px 0 rgba(255,255,255,.3)}
.card-label{font-size:10px;color:rgba(80,100,85,.3);letter-spacing:2px;margin-bottom:4px}
.card-type{font-size:17px;font-weight:400;color:rgba(55,75,60,.75)}
.restart-wrap{margin-top:20px}

/* ═══ 顶栏导航 ═══ */
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:4px}
.tabs button{
  padding:7px 14px;border-radius:16px;border:.5px solid rgba(80,100,85,.12);
  background:transparent;color:rgba(60,80,65,.4);font-family:inherit;
  font-size:11px;font-weight:400;letter-spacing:2px;cursor:pointer;transition:all .3s;
}
.tabs button:hover{color:rgba(60,80,65,.7);border-color:rgba(80,100,85,.2)}
.tabs button.on{background:rgba(100,130,105,.1);border-color:rgba(100,130,105,.25);color:rgba(60,80,65,.75)}
</style>
</head>
<body>

<div class="tabs">
  <button class="on" onclick="show(0)">🏠 首页</button>
  <button onclick="show(1)">🎯 标定</button>
  <button onclick="show(2)">🎬 入场视频</button>
  <button onclick="show(3)">📖 词汇观察</button>
  <button onclick="show(4)">🌂 伞/亭子</button>
  <button onclick="show(5)">☁️ 生成报告</button>
  <button onclick="show(6)">📋 报告页</button>
</div>

<div class="phone">

  <!-- P1: 首页 -->
  <div class="page active p1-bg" id="p0">
    <div class="title-float">雨 中 人</div>
    <div class="sub">一场关于内心世界的雨境之旅</div>
    <button class="mist-btn mist-light" style="font-size:18px;padding:13px 48px;letter-spacing:7px" onclick="toggleBtn(this,'light')">
      <span class="halo"></span><span class="dust-box"></span>开 始
    </button>
  </div>

  <!-- P2: 标定 -->
  <div class="page p2-bg" id="p1" style="gap:0">
    <div class="p2-text">放松自己，<br>测试全程看着屏幕以获得更准确的结果</div>
    <div class="calib-ring"><div class="calib-cross"><div class="calib-dot"></div></div></div>
    <div class="calib-label">看着光点，正在标定...</div>
  </div>

  <!-- P3: 入场视频 -->
  <div class="page vid-bg" id="p2">
    <div class="mask-overlay"></div>
    <div class="vid-inner">
      <div class="vid-hint">你遇到了一位朋友，<br>想象你在和他解释你的烦恼</div>
      <div class="row">
        <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>皱眉</button>
        <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>抿嘴</button>
        <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>皱眉+抿嘴</button>
      </div>
    </div>
  </div>

  <!-- P4: 词汇观察 -->
  <div class="page vid-bg" id="p3">
    <div class="mask-overlay"></div>
    <div class="vid-inner">
      <div class="vid-hint">我们察觉到了你心中深处的雨，<br>看着屏幕中的词汇，放松自己</div>
      <div style="position:relative;width:250px;height:250px">
        <button class="mist-btn mist-dark" style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>听歌</button>
        <button class="mist-btn mist-dark" style="position:absolute;top:48px;right:0;font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>发呆</button>
        <button class="mist-btn mist-dark" style="position:absolute;top:160px;right:8px;font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>娱乐</button>
        <button class="mist-btn mist-dark" style="position:absolute;top:160px;left:8px;font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>游戏</button>
        <button class="mist-btn mist-dark" style="position:absolute;top:48px;left:0;font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>家人</button>
        <button class="mist-btn mist-dark" style="position:absolute;top:104px;left:50%;transform:translateX(-50%);font-size:15px;padding:8px 18px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>朋友</button>
      </div>
    </div>
  </div>

  <!-- P5: 伞/亭子 -->
  <div class="page vid-bg" id="p4">
    <div class="mask-overlay"></div>
    <div class="vid-inner">
      <div class="vid-hint">放松好了吗？场景还在下雨，<br>你的前方出现了一把伞和一个小亭子</div>
      <div class="row">
        <button class="mist-btn mist-dark" style="font-size:23px;padding:14px 34px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>伞</button>
        <button class="mist-btn mist-dark" style="font-size:23px;padding:14px 34px" onclick="toggleBtn(this,'dark')"><span class="halo"></span><span class="dust-box"></span>亭子</button>
      </div>
    </div>
  </div>

  <!-- P6: 加载 -->
  <div class="page load-bg" id="p5">
    <div class="load-cloud">
      <div class="load-bar" style="height:24px;animation-delay:0s"></div>
      <div class="load-bar" style="height:34px;animation-delay:.3s"></div>
      <div class="load-bar" style="height:18px;animation-delay:.6s"></div>
      <div class="load-bar" style="height:30px;animation-delay:.9s"></div>
      <div class="load-bar" style="height:22px;animation-delay:1.2s"></div>
    </div>
    <div class="load-text">正在生成报告</div>
  </div>

  <!-- P7: 报告 -->
  <div class="page p7-bg active" id="p6" style="display:none">
    <div class="p7-inner">
      <div class="p7-title">你的本次雨境画像</div>
      <div class="p7-summary">从情绪表达来看，你在情绪表达上保持克制与清醒；你更关注放松方式所带来的调节…</div>
      <div class="card"><div class="card-label">第1阶段</div><div class="card-type">情绪压抑偏高</div></div>
      <div class="card"><div class="card-label">第2阶段</div><div class="card-type">倾向独自处理情绪</div></div>
      <div class="card"><div class="card-label">第3阶段</div><div class="card-type">倾向于先解决问题</div></div>
      <div class="card"><div class="card-label">第4阶段</div><div class="card-type">倾向于稳定</div></div>
      <div class="restart-wrap">
        <button class="mist-btn mist-light" style="font-size:17px;padding:13px 44px;letter-spacing:5px" onclick="toggleBtn(this,'light')"><span class="halo"></span><span class="dust-box"></span>重新体验</button>
      </div>
    </div>
  </div>

</div>

<script>
function show(i){
  document.querySelectorAll('.tabs button').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active');p.style.display='none'});
  const p=document.getElementById('p'+i);p.style.display='flex';p.classList.add('active');
}
// 初始显示 P6 的报告页修复
document.getElementById('p6').style.display='none';

function toggleBtn(btn,mode){
  const row=btn.parentElement;
  if(row)row.querySelectorAll('.sel').forEach(b=>{b.classList.remove('sel');const db=b.querySelector('.dust-box');if(db)db.innerHTML=''});
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel')){
    const db=btn.querySelector('.dust-box');if(!db)return;
    const cls=mode==='dark'?'dust dust-dark':'dust dust-light';
    for(let i=0;i<10;i++){
      const d=document.createElement('div');d.className=cls;
      d.style.cssText=`--x:${15+Math.random()*70}%;--size:${1+Math.random()*1.5}px;--dur:${2+Math.random()*2.5}s;--delay:${Math.random()*1.5}s;--rise:${25+Math.random()*35}px;--drift:${(Math.random()-.5)*12}px`;
      db.appendChild(d);
    }
  }
}
</script>
</body>
</html>
