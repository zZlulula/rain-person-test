<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨后初晴 · 轻盈治愈</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'ZCOOL XiaoWei','Noto Sans SC','Microsoft YaHei',serif;
  background:#d5dbd0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:100vh;padding:28px;gap:20px;
}

.scene{
  border-radius:20px;padding:44px 32px;position:relative;overflow:hidden;
  min-width:360px;max-width:400px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
/* 视频页：不是全黑蒙版，而是浅灰绿半透明，透气 */
.scene-video{
  background:linear-gradient(180deg,
    rgba(40,48,42,.85) 0%,
    rgba(50,58,52,.82) 40%,
    rgba(45,53,47,.85) 100%);
  /* 模拟视频纹理：极淡的水墨笔触 */
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(180,200,175,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(200,215,195,.03) 0%, transparent 40%);
}
.scene-light{
  background:linear-gradient(180deg,#e8ebe4 0%,#e1e6dc 50%,#e8ebe4 100%);
}
.mask{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:0}
.scene>*{position:relative;z-index:1}

.hint{
  font-size:14px;font-weight:400;text-align:center;max-width:270px;
  line-height:2.2;letter-spacing:2px;font-family:inherit;
}
.hint-dark{color:rgba(220,230,215,.5)}
.hint-light{color:rgba(100,115,105,.42)}
.row{display:flex;gap:32px;justify-content:center;align-items:center;flex-wrap:wrap}
.note{font-size:10px;letter-spacing:3px;margin-top:2px}

/* ═══════════════════════════════════════════
   轻雾按钮
   - 正常态：极淡的雾白文字，几乎融入背景
   - 选中态：文字凝实 + 背后像有光从雾中透出
   - 微尘：光点向上飘升（不是下落），轻盈感
   ═══════════════════════════════════════════ */

.mist-btn{
  position:relative;padding:10px 22px;
  cursor:pointer;font-size:17px;font-weight:400;letter-spacing:3px;
  font-family:inherit;
  outline:none;border:none;background:none;
  transition:all .7s cubic-bezier(.16,1,.3,1);
}
/* 暗底 */
.mist-dark{
  color:rgba(210,225,205,.35);
}
.mist-dark:hover{color:rgba(220,235,215,.55)}
.mist-dark.sel{color:rgba(235,245,230,.88);letter-spacing:4px}

/* 浅底 */
.mist-light{
  color:rgba(100,120,105,.3);
}
.mist-light:hover{color:rgba(90,110,95,.48)}
.mist-light.sel{color:rgba(60,80,65,.78);letter-spacing:4px}

/* 光晕 */
.mist-btn .halo{
  position:absolute;inset:-10px -16px;border-radius:28px;z-index:-1;pointer-events:none;
  opacity:0;transition:opacity .8s ease;
}
.mist-dark .halo{
  background:radial-gradient(ellipse at center,
    rgba(210,230,205,.07) 0%,
    rgba(190,215,185,.025) 35%,
    transparent 65%);
}
.mist-dark.sel .halo{opacity:1}
.mist-light .halo{
  background:radial-gradient(ellipse at center,
    rgba(150,175,145,.06) 0%,
    rgba(130,160,125,.02) 35%,
    transparent 65%);
}
.mist-light.sel .halo{opacity:1}

/* 上升光尘 */
.dust-box{
  position:absolute;inset:-8px -12px;z-index:-1;pointer-events:none;overflow:hidden;
  opacity:0;transition:opacity .8s ease;
}
.sel .dust-box{opacity:1}
.dust{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--dur) ease-out infinite;
  animation-delay:var(--delay);
  width:var(--size);height:var(--size);
  left:var(--x);bottom:-6px;opacity:0;
}
.dust-dark{background:rgba(200,225,195,.45)}
.dust-light{background:rgba(140,170,135,.3)}

@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) translateX(0)}
  15%{opacity:.5}
  60%{opacity:.2}
  100%{opacity:0;transform:translateY(calc(-1 * var(--rise))) translateX(var(--drift))}
}

/* 字面光扫 */
.mist-dark.sel::after,.mist-light.sel::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,
    transparent 25%,rgba(255,255,255,.03) 47%,rgba(255,255,255,.01) 50%,transparent 65%);
  background-size:200% 100%;
  animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-100% 0}}

h2{font-weight:400;letter-spacing:6px;font-size:13px;margin-bottom:2px;opacity:.35}
.tag{font-size:10px;letter-spacing:3px;margin-bottom:4px;opacity:.18}

/* 标题动画 */
.title-float{
  font-size:30px;font-weight:400;letter-spacing:8px;
  animation:titleBreathe 4s ease-in-out infinite;
  font-family:inherit;
}
@keyframes titleBreathe{
  0%,100%{letter-spacing:8px}
  50%{letter-spacing:10px}
}
</style>
</head>
<body>

<!-- ═══ 视频页模拟 ═══ -->
<div style="text-align:center">
  <h2>视频页 · 轻雾中浮现</h2>
  <div class="tag">半透明灰绿蒙版 · 文字如雾中光</div>
</div>
<div class="scene scene-video">
  <div class="mask"></div>
  <div class="hint hint-dark">你遇到了一位朋友，<br>想象你在和他解释你的烦恼</div>
  <div class="row">
    <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')">
      <span class="halo"></span><span class="dust-box"></span>皱眉
    </button>
    <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')">
      <span class="halo"></span><span class="dust-box"></span>抿嘴
    </button>
    <button class="mist-btn mist-dark" onclick="toggleBtn(this,'dark')">
      <span class="halo"></span><span class="dust-box"></span>皱眉+抿嘴
    </button>
  </div>
  <div class="row">
    <button class="mist-btn mist-dark" style="font-size:22px;padding:12px 30px" onclick="toggleBtn(this,'dark')">
      <span class="halo"></span><span class="dust-box"></span>伞
    </button>
    <button class="mist-btn mist-dark" style="font-size:22px;padding:12px 30px" onclick="toggleBtn(this,'dark')">
      <span class="halo"></span><span class="dust-box"></span>亭子
    </button>
  </div>
  <div class="note" style="color:rgba(200,215,195,.12)">点击看选中 · 光尘向上飘</div>
</div>

<!-- ═══ 首页模拟 ═══ -->
<div style="text-align:center;margin-top:4px">
  <h2 style="color:rgba(80,100,85,.35)">首页 · 纸页上的呼吸</h2>
</div>
<div class="scene scene-light">
  <div class="title-float" style="color:rgba(60,80,65,.75);margin-bottom:4px">雨 中 人</div>
  <div class="hint hint-light">一场关于内心世界的雨境之旅</div>
  <div class="row">
    <button class="mist-btn mist-light" style="font-size:18px;padding:13px 46px;letter-spacing:7px" onclick="toggleBtn(this,'light')">
      <span class="halo"></span><span class="dust-box"></span>开 始
    </button>
  </div>
  <div class="note" style="color:rgba(80,100,85,.12)">标题有呼吸般的字间距变化</div>
</div>

<script>
function toggleBtn(btn, mode){
  const row=btn.parentElement;
  row.querySelectorAll('.sel').forEach(b=>{
    b.classList.remove('sel');
    const db=b.querySelector('.dust-box');if(db)db.innerHTML='';
  });
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel')){
    const db=btn.querySelector('.dust-box');if(!db)return;
    const cls=mode==='dark'?'dust dust-dark':'dust dust-light';
    for(let i=0;i<10;i++){
      const d=document.createElement('div');d.className=cls;
      d.style.cssText=`--x:${15+Math.random()*70}%;--size:${1+Math.random()*1.5}px;--dur:${2+Math.random()*2.5}s;--delay:${Math.random()*1.5}s;--rise:${25+Math.random()*35}px;--drift:${(Math.random()-.5)*12}px`;
      db.appendChild(d);
    }
  }
}
</script>
</body>
</html>
