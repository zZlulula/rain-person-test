<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大胆版 · 清晰可见</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#c5cac0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:16px}
.phone{width:380px;background:#e8ebe4;border-radius:32px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.14)}
.page{display:none;aspect-ratio:9/18.5;position:relative;overflow:hidden}
.page.on{display:flex;flex-direction:column;align-items:center;justify-content:center}

.bg-light{background:linear-gradient(180deg,#e8ebe4 0%,#dfe5da 55%,#e8ebe4 100%)}
.bg-vid{background:linear-gradient(180deg,rgba(42,50,44,.88),rgba(38,46,40,.85) 40%,rgba(44,52,46,.86) 100%)}
.bg-vid::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(180,200,175,.04),transparent 50%),radial-gradient(ellipse at 65% 55%,rgba(200,215,195,.025),transparent 40%);z-index:0}
.bg-load{background:linear-gradient(180deg,rgba(42,50,44,.92),rgba(38,46,40,.9),rgba(44,52,46,.92))}
.mask{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:0}

.serif{font-family:'Noto Serif SC',serif}

/* ═══════════════════════════════════════════
   P1: 首页 — 标题呼吸
   ═══════════════════════════════════════════ */
.title-live{
  font-family:'Noto Serif SC',serif;font-size:32px;font-weight:200;
  color:rgba(55,72,58,.78);
  animation:titleLive 4s ease-in-out infinite;
}
@keyframes titleLive{
  0%,100%{letter-spacing:8px;opacity:.78}
  50%{letter-spacing:12px;opacity:.92}
}
.sub-live{font-size:13px;font-weight:300;color:rgba(70,90,78,.5);letter-spacing:4px;margin:10px 0 48px;animation:subBreath 3.5s ease-in-out infinite}
@keyframes subBreath{0%,100%{opacity:.42}50%{opacity:.58}}

/* ═══════════════════════════════════════════
   P2: 标定 — 超明显红点
   ═══════════════════════════════════════════ */
.calib-wrap{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:0}
/* 大呼吸外圈 */
.calib-outer{
  position:absolute;width:120px;height:120px;border-radius:50%;
  border:1px solid rgba(185,155,135,.18);
  animation:outerPulse 2.8s ease-in-out infinite;
}
@keyframes outerPulse{0%,100%{transform:scale(.94);opacity:.4}50%{transform:scale(1.08);opacity:.8}}
/* 中层实心光晕 */
.calib-glow{
  position:absolute;width:50px;height:50px;
  background:radial-gradient(circle,rgba(200,155,125,.3) 0%,rgba(185,140,110,.1) 40%,transparent 70%);
  border-radius:50%;animation:glowBeat 1.8s ease-in-out infinite;
}
@keyframes glowBeat{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.5);opacity:1}}
/* 中心红点 */
.calib-core{
  width:16px;height:16px;border-radius:50%;background:#c48565;
  box-shadow:0 0 18px rgba(196,133,101,.5),0 0 40px rgba(196,133,101,.25),0 0 70px rgba(185,120,90,.12);
  position:relative;z-index:1;animation:coreBeat 1.8s ease-in-out infinite;
}
@keyframes coreBeat{0%,100%{transform:scale(.85)}50%{transform:scale(1.2)}}
/* 十字线 */
.calib-cross{position:absolute;width:80px;height:80px}
.calib-cross::before,.calib-cross::after{content:'';position:absolute;background:rgba(185,155,135,.12)}
.calib-cross::before{top:0;left:50%;width:1px;height:100%}
.calib-cross::after{left:0;top:50%;height:1px;width:100%}
.calib-label{font-size:14px;font-weight:300;color:rgba(80,100,85,.48);letter-spacing:3px;margin-top:24px;animation:subBreath 2.5s ease-in-out infinite}

/* ═══════════════════════════════════════════
   按钮 — 深色文字 + 有趣选中态
   ═══════════════════════════════════════════ */
.mist-enter{opacity:0;transform:translateY(12px);filter:blur(3px)}
.mist-enter.in{animation:mistIn .7s cubic-bezier(.16,1,.3,1) forwards}
@keyframes mistIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}

.btn{
  position:relative;padding:11px 24px;cursor:pointer;
  font-size:16px;font-weight:300;letter-spacing:3px;
  font-family:inherit;outline:none;border:none;background:none;
  transition:all .6s cubic-bezier(.16,1,.3,1);
}

/* 暗底按钮 — 颜色更深更可见 */
.btn-dark{color:rgba(215,232,212,.55)}
.btn-dark:hover{color:rgba(225,240,222,.72)}
/* 暗底选中 */
.btn-dark.sel{
  color:#fff;
  letter-spacing:6px;
  font-weight:400;
  text-shadow:0 0 20px rgba(210,235,205,.35);
}

/* 浅底按钮 — 颜色更深更可见 */
.btn-light{color:rgba(60,80,65,.52)}
.btn-light:hover{color:rgba(50,70,55,.68)}
/* 浅底选中 */
.btn-light.sel{
  color:rgba(38,55,42,.8);
  letter-spacing:6px;
  font-weight:400;
}

/* 光晕 — 更大更亮 */
.btn .glow{
  position:absolute;inset:-14px -20px;border-radius:32px;z-index:-1;pointer-events:none;
  opacity:0;transition:opacity .5s ease;
}
.btn-dark .glow{
  background:
    radial-gradient(ellipse at center,rgba(215,235,210,.12) 0%,rgba(195,220,190,.05) 30%,transparent 60%),
    radial-gradient(ellipse at center,rgba(225,240,220,.06) 0%,transparent 40%);
}
.btn-dark.sel .glow{opacity:1}
.btn-light .glow{
  background:
    radial-gradient(ellipse at center,rgba(155,180,150,.1) 0%,rgba(140,165,135,.04) 30%,transparent 60%),
    radial-gradient(ellipse at center,rgba(170,195,165,.05) 0%,transparent 40%);
}
.btn-light.sel .glow{opacity:1}

/* 选中时扩圈动画 */
.btn .ring{
  position:absolute;inset:-6px;border-radius:20px;z-index:-2;pointer-events:none;
  border:1px solid transparent;opacity:0;
}
.btn-dark .ring{border-color:rgba(210,230,205,.15)}
.btn-light .ring{border-color:rgba(145,170,140,.15)}
.btn.sel .ring{animation:ringExpand 1.2s cubic-bezier(.16,1,.3,1) forwards}
@keyframes ringExpand{
  0%{opacity:.6;inset:-6px;border-radius:18px}
  100%{opacity:0;inset:-24px;border-radius:30px}
}

/* 光尘 — 更明显 */
.dust-cage{position:absolute;inset:-10px -14px;z-index:-1;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .5s ease}
.sel .dust-cage{opacity:1}
.dust{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp var(--dur) ease-out infinite;animation-delay:var(--delay);width:var(--size);height:var(--size);left:var(--x);bottom:-8px;opacity:0}
.dust-d{background:rgba(210,235,205,.55)}.dust-l{background:rgba(150,180,145,.4)}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) translateX(0)}12%{opacity:.7}55%{opacity:.25}100%{opacity:0;transform:translateY(calc(-1 * var(--rise))) translateX(var(--drift))}}

/* 字面闪烁 */
.btn-dark.sel::after,.btn-light.sel::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.04) 47%,rgba(255,255,255,.015) 50%,transparent 65%);
  background-size:200% 100%;animation:shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-100% 0}}

/* 通用 */
.row{display:flex;gap:28px;justify-content:center;align-items:center;flex-wrap:wrap;position:relative;z-index:1}
.inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:30px 20px}
.vid-text{font-size:14px;font-weight:300;text-align:center;max-width:270px;line-height:2.1;letter-spacing:2px;color:rgba(210,228,208,.5);animation:subBreath 4s ease-in-out infinite}
@keyframes vidBreath{0%,100%{opacity:.45}50%{opacity:.6}}

/* 加载 */
.load-bars{display:flex;gap:5px;align-items:flex-end;margin-bottom:18px}
.load-bar{width:3px;border-radius:1.5px;background:rgba(180,205,175,.55);animation:cloudBreath 2.6s ease-in-out infinite}
@keyframes cloudBreath{0%,100%{opacity:.1;transform:scaleY(.55)}50%{opacity:.7;transform:scaleY(1)}}
.load-label{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:300;letter-spacing:4px;color:rgba(200,220,195,.55);animation:cloudBreath 2.6s ease-in-out infinite}

/* 报告 */
.rpt-card{padding:16px 18px;border-radius:14px;margin-bottom:10px;width:100%;background:rgba(255,255,255,.32);border:.5px solid rgba(80,100,85,.05);box-shadow:0 1px 0 rgba(255,255,255,.25)}
.card-tag{font-size:10px;color:rgba(80,100,85,.32);letter-spacing:2px;margin-bottom:4px}
.card-body{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:300;color:rgba(50,68,55,.72)}

.tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:2px}
.tabs button{padding:6px 12px;border-radius:14px;border:.5px solid rgba(80,100,85,.1);background:transparent;color:rgba(60,80,65,.38);font-family:inherit;font-size:10px;font-weight:300;letter-spacing:2px;cursor:pointer;transition:all .3s}
.tabs button:hover{color:rgba(60,80,65,.6);border-color:rgba(80,100,85,.18)}
.tabs button.on{background:rgba(100,130,105,.08);border-color:rgba(100,130,105,.2);color:rgba(60,80,65,.7)}
</style>
</head>
<body>

<div class="tabs">
  <button class="on" onclick="show(0)">🏠</button><button onclick="show(1)">🎯</button><button onclick="show(2)">🎬</button><button onclick="show(3)">📖</button><button onclick="show(4)">🌂</button><button onclick="show(5)">☁️</button><button onclick="show(6)">📋</button>
</div>

<div class="phone">

  <!-- P1 -->
  <div class="page on bg-light" id="p0">
    <div class="mist-enter in title-live" style="animation-delay:0s;animation-duration:.9s">雨 中 人</div>
    <div class="mist-enter in sub-live" style="animation-delay:.15s">一场关于内心世界的雨境之旅</div>
    <div class="mist-enter in" style="animation-delay:.35s">
      <button class="btn btn-light" style="font-size:18px;padding:14px 48px;letter-spacing:7px" onclick="pick(this,'light')">
        <span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>开 始
      </button>
    </div>
  </div>

  <!-- P2: 超明显红点 -->
  <div class="page bg-light" id="p1" style="gap:0">
    <div class="mist-enter" style="font-size:16px;font-weight:300;letter-spacing:2px;color:rgba(70,90,78,.52);text-align:center;line-height:2;padding:0 30px;margin-bottom:32px">放松自己，<br>测试全程看着屏幕以获得更准确的结果</div>
    <div class="mist-enter calib-wrap" style="animation-delay:.3s">
      <div class="calib-outer"></div>
      <div class="calib-glow"></div>
      <div class="calib-cross"></div>
      <div class="calib-core"></div>
    </div>
    <div class="mist-enter calib-label" style="animation-delay:.5s">看着光点，正在标定...</div>
  </div>

  <!-- P3 -->
  <div class="page bg-vid" id="p2"><div class="mask"></div><div class="inner">
    <div class="mist-enter vid-text" style="animation-delay:.2s">你遇到了一位朋友，<br>想象你在和他解释你的烦恼</div>
    <div class="row">
      <div class="mist-enter" style="animation-delay:.5s"><button class="btn btn-dark" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>皱眉</button></div>
      <div class="mist-enter" style="animation-delay:.6s"><button class="btn btn-dark" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>抿嘴</button></div>
      <div class="mist-enter" style="animation-delay:.7s"><button class="btn btn-dark" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>皱眉+抿嘴</button></div>
    </div>
  </div></div>

  <!-- P4 -->
  <div class="page bg-vid" id="p3"><div class="mask"></div><div class="inner">
    <div class="mist-enter vid-text" style="animation-delay:.2s">我们察觉到了你心中深处的雨，<br>看着屏幕中的词汇，放松自己</div>
    <div style="position:relative;width:250px;height:250px">
      <div class="mist-enter" style="animation-delay:.4s;position:absolute;top:0;left:50%;transform:translateX(-50%)"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>听歌</button></div>
      <div class="mist-enter" style="animation-delay:.48s;position:absolute;top:48px;right:0"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>发呆</button></div>
      <div class="mist-enter" style="animation-delay:.56s;position:absolute;top:160px;right:8px"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>娱乐</button></div>
      <div class="mist-enter" style="animation-delay:.64s;position:absolute;top:160px;left:8px"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>游戏</button></div>
      <div class="mist-enter" style="animation-delay:.72s;position:absolute;top:48px;left:0"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>家人</button></div>
      <div class="mist-enter" style="animation-delay:.8s;position:absolute;top:104px;left:50%;transform:translateX(-50%)"><button class="btn btn-dark" style="font-size:15px;padding:8px 18px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>朋友</button></div>
    </div>
  </div></div>

  <!-- P5 -->
  <div class="page bg-vid" id="p4"><div class="mask"></div><div class="inner">
    <div class="mist-enter vid-text" style="animation-delay:.2s">放松好了吗？场景还在下雨，<br>你的前方出现了一把伞和一个小亭子</div>
    <div class="row">
      <div class="mist-enter" style="animation-delay:.5s"><button class="btn btn-dark" style="font-size:23px;padding:14px 36px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>伞</button></div>
      <div class="mist-enter" style="animation-delay:.6s"><button class="btn btn-dark" style="font-size:23px;padding:14px 36px" onclick="pick(this,'dark')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>亭子</button></div>
    </div>
  </div></div>

  <!-- P6 -->
  <div class="page bg-load" id="p5">
    <div class="load-bars"><div class="load-bar" style="height:24px;animation-delay:0s"></div><div class="load-bar" style="height:34px;animation-delay:.3s"></div><div class="load-bar" style="height:18px;animation-delay:.6s"></div><div class="load-bar" style="height:30px;animation-delay:.9s"></div><div class="load-bar" style="height:22px;animation-delay:1.2s"></div></div>
    <div class="load-label">正在生成报告</div>
  </div>

  <!-- P7 -->
  <div class="page bg-light" id="p6" style="overflow-y:auto;padding:34px 22px 44px;display:none;align-items:center">
    <div class="mist-enter in serif" style="animation-delay:.05s;font-size:21px;font-weight:200;letter-spacing:4px;color:rgba(50,68,55,.73);text-align:center;margin-bottom:10px">你的本次雨境画像</div>
    <div class="mist-enter in" style="animation-delay:.15s;font-size:13px;font-weight:300;color:rgba(65,85,72,.48);text-align:center;line-height:1.9;margin-bottom:22px">从情绪表达来看，你在情绪表达上保持克制与清醒…</div>
    <div class="mist-enter in rpt-card" style="animation-delay:.25s"><div class="card-tag">第1阶段</div><div class="card-body">情绪压抑偏高</div></div>
    <div class="mist-enter in rpt-card" style="animation-delay:.35s"><div class="card-tag">第2阶段</div><div class="card-body">倾向独自处理情绪</div></div>
    <div class="mist-enter in rpt-card" style="animation-delay:.45s"><div class="card-tag">第3阶段</div><div class="card-body">倾向于先解决问题</div></div>
    <div class="mist-enter in rpt-card" style="animation-delay:.55s"><div class="card-tag">第4阶段</div><div class="card-body">倾向于稳定</div></div>
    <div class="mist-enter in" style="animation-delay:.65s;margin-top:16px">
      <button class="btn btn-light" style="font-size:17px;padding:13px 44px;letter-spacing:5px" onclick="pick(this,'light')"><span class="glow"></span><span class="ring"></span><span class="dust-cage"></span>重新体验</button>
    </div>
  </div>

</div>

<script>
function show(i){
  document.querySelectorAll('.tabs button').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('on');p.style.display='none'});
  const p=document.getElementById('p'+i);p.style.display='flex';p.classList.add('on');
  p.querySelectorAll('.mist-enter').forEach(el=>{el.classList.remove('in');el.offsetHeight;el.classList.add('in')});
}

function pick(btn,mode){
  const row=btn.closest('.row');const scope=row||btn.parentElement;
  scope.querySelectorAll('.sel').forEach(b=>{
    b.classList.remove('sel');
    const dc=b.querySelector('.dust-cage');if(dc)dc.innerHTML='';
  });
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel')){
    const dc=btn.querySelector('.dust-cage');if(!dc)return;
    const cls=mode==='dark'?'dust dust-d':'dust dust-l';
    for(let i=0;i<14;i++){
      const d=document.createElement('div');d.className=cls;
      d.style.cssText=`--x:${15+Math.random()*70}%;--size:${1.5+Math.random()*2}px;--dur:${1.5+Math.random()*2.5}s;--delay:${Math.random()*1.2}s;--rise:${30+Math.random()*40}px;--drift:${(Math.random()-.5)*14}px`;
      dc.appendChild(d);
    }
  }
}
</script>
</body>
</html>
