<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预览 — 红点呼吸 + 首页美化 + 转场加速</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0f0a; color:#d5e5d2; font-family:'Noto Serif SC','Noto Sans SC',sans-serif; }
  .section { padding:40px 0; border-bottom:1px solid #122012; }
  .section h2 { text-align:center; font-weight:300; letter-spacing:4px; color:#7a9a7a; font-size:14px; margin-bottom:30px; }
  .section h2 span { color:#c8a860; }

  /* ══════════════════════════════════════════ */
  /* 1. 红点呼吸 + 丝滑移动 */
  /* ══════════════════════════════════════════ */
  .calib-row { display:flex; justify-content:center; gap:60px; }
  .calib-card { text-align:center; }
  .calib-label { font-size:11px; letter-spacing:2px; color:#5a7a5a; margin-bottom:16px; }
  .calib-stage { width:200px; height:200px; background:#0d120d; border-radius:16px; position:relative; overflow:hidden; }
  .calib-dot { position:absolute; width:24px; height:24px; border-radius:50%; background:radial-gradient(circle,#ff5a4a,#d03020); left:50%; top:50%; transform:translate(-50%,-50%); transition:left 0.4s cubic-bezier(0.32,0.72,0,1),top 0.4s cubic-bezier(0.32,0.72,0,1); }
  .calib-dot.breathing { animation:dotBreathe 2.8s ease-in-out infinite; }
  @keyframes dotBreathe {
    0%,100% { box-shadow:0 0 20px rgba(255,60,40,0.7),0 0 50px rgba(255,50,30,0.35),0 0 90px rgba(220,40,20,0.15); }
    50% { box-shadow:0 0 32px rgba(255,60,40,0.95),0 0 70px rgba(255,50,30,0.50),0 0 120px rgba(220,40,20,0.25); }
  }
  .calib-dot.static { box-shadow:0 0 20px rgba(255,60,40,0.55),0 0 50px rgba(255,50,30,0.2),0 0 80px rgba(220,40,20,0.08); }
  .calib-ring { position:absolute; width:60px; height:60px; border-radius:50%; border:1px solid rgba(255,80,60,0.18); left:50%; top:50%; transform:translate(-50%,-50%); }
  .calib-ring.breathing { animation:ringBreathe 2.8s ease-in-out infinite; }
  @keyframes ringBreathe {
    0%,100% { width:60px; height:60px; opacity:0.15; }
    50% { width:78px; height:78px; opacity:0.30; }
  }
  .calib-cross { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
  .calib-cross::before, .calib-cross::after { content:''; position:absolute; background:rgba(255,80,60,0.1); }
  .calib-cross::before { width:40px; height:0.5px; left:-20px; top:0; }
  .calib-cross::after { width:0.5px; height:40px; left:0; top:-20px; }

  /* ══════════════════════════════════════════ */
  /* 2. 首页 BEFORE/AFTER */
  /* ══════════════════════════════════════════ */
  .home-row { display:flex; justify-content:center; gap:48px; }
  .home-card { width:340px; height:420px; border-radius:16px; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .home-card.before { background:#e8ebe4; }
  .home-card.after { background:#e8ebe4; }

  /* rain bg */
  .rain-bg { position:absolute; inset:0; pointer-events:none; }
  .raindrop { position:absolute; width:1px; background:rgba(90,120,90,0.12); animation:rain linear infinite; }
  @keyframes rain { 0%{transform:translateY(-420px);} 100%{transform:translateY(420px);} }

  .home-title { font-size:44px; font-weight:200; letter-spacing:8px; color:rgba(42,58,46,0.78); position:relative; z-index:1; }
  .home-title.breathing { animation:homeTitleBreathe 4s ease-in-out infinite; }
  @keyframes homeTitleBreathe {
    0%,100% { transform:scale(1); letter-spacing:8px; color:rgba(42,58,46,0.75); text-shadow:0 0 0 rgba(42,58,46,0); }
    50% { transform:scale(1.018); letter-spacing:12px; color:rgba(42,58,46,0.92); text-shadow:0 0 30px rgba(42,58,46,0.06); }
  }
  .home-title.after-breathe {
    animation:homeTitleAfter 3.6s ease-in-out infinite;
    font-family:'Noto Serif SC',serif;
    text-shadow:0 0 40px rgba(120,160,110,0.08),0 0 80px rgba(100,140,90,0.04);
  }
  @keyframes homeTitleAfter {
    0%,100% { transform:scale(1); letter-spacing:8px; opacity:0.82; }
    50% { transform:scale(1.028); letter-spacing:14px; opacity:0.98; }
  }

  .home-sub { font-size:14px; font-weight:300; color:rgba(42,58,46,0.42); margin-top:14px; position:relative; z-index:1; }
  .home-sub.after-sub {
    font-family:'Noto Serif SC',serif;
    animation:subBreathe 4.5s ease-in-out infinite;
    letter-spacing:3px;
  }
  @keyframes subBreathe {
    0%,100% { opacity:0.45; transform:translateY(0); }
    50% { opacity:0.65; transform:translateY(-2px); }
  }

  .home-btn { margin-top:60px; position:relative; z-index:1; }
  .home-btn.before-btn { padding:14px 48px; border:1px solid rgba(58,74,63,0.25); border-radius:14px; font-size:20px; font-weight:300; letter-spacing:7px; color:rgba(42,58,46,0.75); background:transparent; }
  .home-btn.after-btn {
    padding:16px 56px; font-size:22px; font-weight:300; letter-spacing:8px;
    font-family:'Noto Serif SC',serif;
    color:#7a6a4a; border:none; border-radius:0;
    background:transparent;
    animation:btnBreathe 3.2s ease-in-out infinite;
    position:relative;
  }
  @keyframes btnBreathe {
    0%,100% { color:rgba(122,106,74,0.6); text-shadow:0 0 0 rgba(180,150,80,0); }
    50% { color:rgba(160,140,100,0.9); text-shadow:0 0 20px rgba(180,150,80,0.20),0 0 40px rgba(160,130,70,0.08); }
  }
  .btn-underline { position:absolute; bottom:-4px; left:20%; width:60%; height:1px; background:linear-gradient(90deg,transparent,rgba(180,150,80,0.3),transparent); animation:lineBreathe 3.2s ease-in-out infinite; }
  @keyframes lineBreathe {
    0%,100% { opacity:0.2; width:50%; left:25%; }
    50% { opacity:0.5; width:70%; left:15%; }
  }

  /* ══════════════════════════════════════════ */
  /* 3. 转场时序 */
  /* ══════════════════════════════════════════ */
  .timeline-compare { display:flex; justify-content:center; gap:40px; }
  .tl-col { width:280px; }
  .tl-label { font-size:11px; letter-spacing:2px; color:#5a7a5a; margin-bottom:10px; text-align:center; }
  .tl-bar { height:6px; border-radius:3px; background:#1a2a1a; position:relative; margin-bottom:8px; }
  .tl-fill { height:100%; border-radius:3px; }
  .tl-fill.old { background:#5a7a5a; width:55%; }
  .tl-fill.new { background:#c8a860; width:30%; }
  .tl-ms { font-size:10px; color:#5a7a5a; text-align:right; }

  .glow-spark {
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#d4b870; animation:sparkFloat 3s ease-in-out infinite;
  }
  @keyframes sparkFloat {
    0%,100% { opacity:0; transform:translateY(0); }
    50% { opacity:0.6; transform:translateY(-20px); }
  }

</style>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!-- 1. 红点呼吸 + 丝滑移动 -->
<!-- ══════════════════════════════════════════ -->
<div class="section">
  <h2><span>●</span> 标定红点 — 呼吸感 + 丝滑移动</h2>
  <div class="calib-row">
    <!-- BEFORE -->
    <div class="calib-card">
      <div class="calib-label">BEFORE — 静态光点</div>
      <div class="calib-stage" id="calib-before">
        <div class="calib-ring static"></div>
        <div class="calib-cross"></div>
        <div class="calib-dot static" id="dot-before"></div>
      </div>
    </div>
    <!-- AFTER -->
    <div class="calib-card">
      <div class="calib-label">AFTER — 呼吸光点 + easeInOutCubic 移动</div>
      <div class="calib-stage" id="calib-after">
        <div class="calib-ring breathing"></div>
        <div class="calib-cross"></div>
        <div class="calib-dot breathing" id="dot-after"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- 2. 首页美化 -->
<!-- ══════════════════════════════════════════ -->
<div class="section">
  <h2><span>⌂</span> 首页 — 雨中人</h2>
  <div class="home-row">
    <!-- BEFORE -->
    <div class="home-card before">
      <div class="rain-bg" id="rain-before"></div>
      <div class="home-title breathing">雨中人</div>
      <div class="home-sub">一场关于内心世界的雨境之旅</div>
      <div class="home-btn before-btn">开 始</div>
    </div>
    <!-- AFTER -->
    <div class="home-card after">
      <div class="rain-bg" id="rain-after"></div>
      <div class="home-title after-breathe">雨 中 人</div>
      <div class="home-sub after-sub">一场关于内心世界的雨境之旅</div>
      <div class="home-btn after-btn">
        开 始
        <div class="btn-underline"></div>
      </div>
      <!-- 浮游光点 -->
      <div class="glow-spark" style="top:28%;left:18%;animation-delay:0s;"></div>
      <div class="glow-spark" style="top:32%;left:78%;animation-delay:1.2s;"></div>
      <div class="glow-spark" style="top:45%;left:12%;animation-delay:2.1s;"></div>
      <div class="glow-spark" style="top:50%;left:85%;animation-delay:0.7s;"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- 3. 转场加速 -->
<!-- ══════════════════════════════════════════ -->
<div class="section">
  <h2><span>↻</span> 视频转场 — 黑蒙版时长</h2>
  <div class="timeline-compare">
    <div class="tl-col">
      <div class="tl-label">BEFORE — 600ms 持黑 + 350ms 淡出</div>
      <div class="tl-bar"><div class="tl-fill old"></div></div>
      <div class="tl-ms">~950ms 总转场</div>
    </div>
    <div class="tl-col">
      <div class="tl-label">AFTER — 150ms 持黑 + 150ms 淡出</div>
      <div class="tl-bar"><div class="tl-fill new"></div></div>
      <div class="tl-ms">~300ms 总转场</div>
    </div>
  </div>
</div>

<script>
// ── 红点移动动画 ──
const points = [
  {x:15,y:15},{x:85,y:10},{x:12,y:82},{x:88,y:80},{x:50,y:50},
  {x:25,y:55},{x:75,y:35},{x:40,y:20},{x:60,y:70}
];

async function moveDots() {
  let i = 0;
  while (true) {
    const p = points[i % points.length];
    const before = document.getElementById('dot-before');
    const after = document.getElementById('dot-after');
    before.style.left = p.x+'%'; before.style.top = p.y+'%';
    after.style.left = p.x+'%'; after.style.top = p.y+'%';
    i++;
    await new Promise(r => setTimeout(r, 1200));
  }
}
moveDots();

// ── 雨滴生成 ──
function makeRain(containerId, count) {
  const c = document.getElementById(containerId);
  for (let i=0;i<count;i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random()*100+'%';
    drop.style.animationDuration = (0.6+Math.random()*1.8)+'s';
    drop.style.animationDelay = Math.random()*3+'s';
    drop.style.height = (6+Math.random()*18)+'px';
    c.appendChild(drop);
  }
}
makeRain('rain-before', 40);
makeRain('rain-after', 50);
</script>
</body>
</html>
